<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Morel Forager v5.4d</title>
<style>body{margin:0;background:#0a0f0a;color:#d7f0d7;font-family:system-ui;overflow:hidden}
#ui{position:absolute;top:8px;left:8px;background:#0008;padding:6px 8px;border-radius:6px;font-size:13px}
#log{position:absolute;bottom:0;left:0;right:0;height:70px;background:#000a;overflow:auto;padding:4px;font-size:11px}
canvas{display:block;margin:0 auto}</style></head><body>
<div id="ui">Zone:<b id="z">1</b> | <span id="pos"></span> | E=editor T=rings?=dump</div>
<canvas id="c" width="800" height="600"></canvas><div id="log"></div>
<script>
const $=id=>document.getElementById(id), ctx=c.getContext('2d'), log=m=>{logd.innerHTML+=m+'<br>';logd.scrollTop=1e9};
const logd=$('log'); let cur=0,px=10,py=540,lastTele=0; window.lastTeleUsed=null; let editor=true, show=false;
const teles=[
 {from:0,x:790,y:514,to:1,nx:39,ny:517,r:28},{from:1,x:10,y:514,to:0,nx:764,ny:524,r:28},
 {from:1,x:790,y:55,to:2,nx:45,ny:90,r:28},{from:2,x:10,y:55,to:1,nx:770,ny:100,r:28},
 {from:2,x:680,y:590,to:3,nx:685,ny:95,r:28},{from:3,x:680,y:10,to:2,nx:683,ny:520,r:28},
 {from:3,x:10,y:545,to:4,nx:765,ny:541,r:28},{from:4,x:790,y:545,to:3,nx:26,ny:545,r:28},
 {from:4,x:10,y:104,to:5,nx:769,ny:99,r:28},{from:5,x:790,y:102,to:4,nx:35,ny:104,r:28},
 {from:5,x:10,y:540,to:0,nx:32,ny:544,r:28},
];
function check(){const n=Date.now();if(n-lastTele<800)return;for(const t of teles){if(cur===t.from&&Math.hypot(px-t.x,py-t.y)<t.r){lastTele=n;window.lastTeleUsed=t;cur=t.to;px=t.nx;py=t.ny;$('z').textContent=cur+1;log(`HIT ${t.from+1}→${t.to+1} — move to good spot then Shift+T`);break}}}
function draw(){ctx.clearRect(0,0,800,600);ctx.fillStyle='#223';ctx.fillRect(0,0,800,600);ctx.fillStyle='#8f8';ctx.beginPath();ctx.arc(px,py,6,0,7);ctx.fill();if(show){ctx.strokeStyle='#ff0';teles.filter(t=>t.from===cur).forEach(t=>{ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,7);ctx.stroke()})}$('pos').textContent=`${Math.round(px)},${Math.round(py)}`}
function mv(dx,dy){px=Math.max(5,Math.min(795,px+dx*4));py=Math.max(5,Math.min(595,py+dy*4));check();draw()}
addEventListener('keydown',e=>{if(e.key==='e')editor=!editor; if(e.key==='t'&&!e.shiftKey){show=!show;draw()} if(e.key==='?' ){console.log('COPY THIS ARRAY:',JSON.stringify(teles,null,2));log('Dumped to console')} if(e.key==='T'&&e.shiftKey||e.key==='t'&&e.shiftKey){if(!window.lastTeleUsed){log('teleport first');return}window.lastTeleUsed.nx=Math.round(px);window.lastTeleUsed.ny=Math.round(py);const out=JSON.stringify(window.lastTeleUsed);console.log('COPY THIS OBJECT:',out);log(`SAVED → ${out}`);navigator.clipboard?.writeText(out)} const k={w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]}[e.key.toLowerCase()]; if(k)mv(k[0],k[1])}); draw(); log('v5.4d ready — E toggles editor, T shows rings')
</script></body></html>
