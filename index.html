<!DOCTYPE html><html><head><meta charset="utf-8"><title>Morel v5.3</title><style>body{margin:0;background:#0a0c0f;color:#d7e0d7;font:14px system-ui;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px 12px;margin:8px;background:#121821;border:1px solid #1e2a36;border-radius:10px;flex-wrap:wrap}#hud b{color:#fff}#game{width:1024px;height:768px;max-width:95vw;max-height:72vh;background:#000;border:1px solid #222;border-radius:8px;image-rendering:pixelated;image-rendering:crisp-edges}#controls{display:flex;gap:6px;margin:6px}button{background:#1a2330;color:#e0e8e0;border:1px solid #2a3747;padding:8px 12px;border-radius:8px;cursor:pointer;font-weight:600}button:active{transform:translateY(1px)}#log{width:1024px;max-width:95vw;height:90px;overflow:auto;background:#0e141b;border:1px solid #1c2530;padding:6px;font:12px ui-monospace,monospace;white-space:pre-line}.pill{padding:2px 7px;border-radius:99px;font-size:11px;margin-left:6px;display:none}#hide{background:#14331f;color:#9fe29f;border:1px solid #1f5a36}#alert{background:#3a1616;color:#ffb4b4;border:1px solid #5a1f1f}</style></head><body>
<div id="hud">Zone:<b id="z">0</b> Day:<b id="d">1</b> $<b id="c">$75</b> MP:<b id="m">100</b> Bag:<b id="b">0/18</b> Scent:<b id="s">0</b><span id="hide" class="pill">HIDING</span><span id="alert" class="pill">SPOTTED!</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="pk()">POKE</button><button onclick="sell()">SELL</button><button onclick="tres()">TRESPASS</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=400,py=300,bag=[],cash=75,mp=100,maxBag=18,day=1,face=1,dir='down',anim=0,tresp=false,scent=[];
const bg=[],bush=[],water=[],swamp=[],walk=[],morels=[[],[],[],[],[],[]];
const gear={boots:false,waders:true,swamp:true};
let guards=[],dogs=[];
const cv=document.getElementById('game'),cx=cv.getContext('2d');cx.imageSmoothingEnabled=false;
const $=id=>document.getElementById(id),log=t=>{$('log').textContent=`[D${day}] ${t}\n`+$('log').textContent};

async function loadImg(name){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+name})}
async function loadSpr(name){const i=new Image();i.crossOrigin='anonymous';i.src=BASE+name;return new Promise(r=>{i.onload=()=>r(i);i.onerror=()=>r(new Image())})}

const [s1,s2,sp]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png'].map(loadSpr));
let curSpr=s1;

for(let i=0;i<6;i++){
  bg[i]=await loadImg(`Map_${i+1}_BG.png`);
  bush[i]=await loadImg(`Map_${i+1}_Bushes.png`);
  water[i]=await loadImg(`Water_Puddles_${i+1}.png`);
  swamp[i]=await loadImg(`Swamp_Puddles_${i+1}.png`);
  // build walk map from bg tan paths
  if(bg[i]){const d=bg[i].getContext('2d').getImageData(0,0,800,600).data;walk[i]=new Uint8Array(800*600);for(let p=0;p<800*600;p++){const o=p*4;walk[i][p]=(d[o]>165&&d[o+1]>140&&d[o+2]<190)?1:0}}
}
const inBush=(x,y)=>bush[cur]&&bush[cur].getContext('2d').getImageData(x,y,1,1).data[3]>10;
const canWalk=(x,y)=>{if(x<2||y<2||x>797||y>597)return false;if(inBush(x,y))return true;if(water[cur]&&water[cur].getContext('2d').getImageData(x,y,1,1).data[3]>10&&gear.waders)return true;if(swamp[cur]&&swamp[cur].getContext('2d').getImageData(x,y,1,1).data[3]>10&&gear.swamp)return true;return walk[cur]?walk[cur][y*800+x]===1:true};

function upd(){$('z').textContent=cur;$('d').textContent=day;$('c').textContent=cash;$('m').textContent=Math.floor(mp);$('b').textContent=bag.length+'/'+maxBag;$('s').textContent=scent.length;$('hide').style.display=(tresp&&inBush(px,py))?'inline-block':'none';$('alert').style.display=guards.some(g=>see(g))?'inline-block':'none'}
function spawn(z){if(morels[z].length)return;for(let i=0;i<20;i++){let t=0;while(t++<500){const x=40+Math.random()*720,y=40+Math.random()*520;if(canWalk(x,y)&&Math.random()<0.3){morels[z].push({x,y,t:Math.random()<0.7?'yellow':'black',rev:false});break}}}}
function see(g){const dx=px-g.x,dy=py-g.y,d=Math.hypot(dx,dy);if(d>82||inBush(px,py))return false;const a=Math.atan2(dy,dx);let da=Math.abs(((a-g.a+Math.PI*3)%(2*Math.PI))-Math.PI);return da<1.04}

window.mv=(dx,dy)=>{const nx=px+dx*3.2,ny=py+dy*3.2;if(!canWalk(nx,ny))return;px=nx;py=ny;if(dx<0)face=-1;if(dx>0)face=1;if(dy<0)dir='up';if(dy>0)dir='down';curSpr=curSpr===s1?s2:s1;if(tresp){mp-=gear.boots?0.035:0.07;scent.push({x:px,y:py,t:Date.now()});if(scent.length>250)scent.shift();if(mp<=0)end('tired')}upd()}
window.pk=()=>{curSpr=sp;anim=10;setTimeout(()=>curSpr=s1,140);const m=morels[cur].find(o=>!o.rev&&Math.hypot(px-o.x,py-o.y)<20);if(m){m.rev=true;log('peeked '+m.t);upd();return}const n=morels[cur].find(o=>o.rev&&Math.hypot(px-o.x,py-o.y)<20);if(n&&bag.length<maxBag){morels[cur]=morels[cur].filter(x=>x!==n);bag.push(n.t);log('picked '+n.t+(tresp?' *HOT*':''));mp-=0.8}upd()}
window.sell=()=>{const v=bag.reduce((s,t)=>s+(t==='yellow'?8:13)*(tresp?2:1),0);cash+=v;bag=[];log('sold $'+v);upd()}
window.tres=()=>{if(tresp){end('left');return}if(cur===0){log('Woods is safe');return}tresp=true;mp=100;scent=[];guards=[];dogs=[];for(let i=0;i<2;i++)guards.push({x:150+Math.random()*500,y:100+Math.random()*400,vx:(Math.random()-0.5)*2.4,vy:(Math.random()-0.5)*2.4,a:0});for(let i=0;i<2;i++)dogs.push({x:400,y:300});log('TRESPASS - stay in bushes');upd()}
function end(r){if(!tresp)return;tresp=false;if(r==='bust'){const f=35+Math.floor(Math.random()*35);cash=Math.max(0,cash-f);bag=[];log('BUSTED -$'+f)}day++;guards=[];dogs=[];scent=[];cur=0;px=400;py=300;spawn(0);upd()}

spawn(0);upd();
setInterval(()=>{if(!tresp&&mp<100){mp=Math.min(100,mp+0.3);upd()}},1000);

function draw(){
  cx.clearRect(0,0,800,600);
  if(bg[cur])cx.drawImage(bg[cur],0,0);
  // subtle water
  if(water[cur]&&gear.waders){cx.globalAlpha=0.18;cx.drawImage(water[cur],0,0);cx.globalCompositeOperation='multiply';cx.fillStyle='#4da6ff';cx.fillRect(0,0,800,600);cx.globalCompositeOperation='source-over';cx.globalAlpha=1}
  if(swamp[cur]&&gear.swamp){cx.globalAlpha=0.16;cx.drawImage(swamp[cur],0,0);cx.globalCompositeOperation='multiply';cx.fillStyle='#5fd35f';cx.fillRect(0,0,800,600);cx.globalCompositeOperation='source-over';cx.globalAlpha=1}
  if(bush[cur])cx.drawImage(bush[cur],0,0);

  morels[cur].forEach(m=>{if(!m.rev){cx.fillStyle='#0f1a0f';cx.fillRect(m.x-4,m.y-4,8,8);cx.strokeStyle='#1e3a1e';cx.strokeRect(m.x-4,m.y-4,8,8)}else{cx.fillStyle=m.t==='yellow'?'#ffdb5c':'#3e2723';cx.beginPath();cx.arc(m.x,m.y,5.5,0,7);cx.fill();cx.fillStyle='#2a1a12';cx.beginPath();cx.arc(m.x,m.y,2,0,7);cx.fill()}});

  if(tresp){
    scent=scent.filter(s=>Date.now()-s.t<(gear.boots?3000:5000));
    cx.strokeStyle='rgba(180,150,90,0.15)';scent.forEach(s=>{cx.beginPath();cx.arc(s.x,s.y,2,0,7);cx.stroke()});
    guards.forEach(g=>{g.x+=g.vx;g.y+=g.vy;if(g.x<30||g.x>770)g.vx*=-1;if(g.y<30||g.y>570)g.vy*=-1;g.a=Math.atan2(g.vy,g.vx);cx.save();cx.translate(g.x,g.y);cx.rotate(g.a);cx.fillStyle='rgba(255,220,80,0.12)';cx.beginPath();cx.moveTo(0,0);cx.arc(0,0,82,-1.04,1.04);cx.fill();cx.restore();cx.fillStyle='#d32f2f';cx.beginPath();cx.arc(g.x,g.y,6.5,0,7);cx.fill();if(see(g))end('bust')});
    dogs.forEach(d=>{if(scent.length){const t=scent[0];const dx=t.x-d.x,dy=t.y-d.y,di=Math.hypot(dx,dy);if(di>1){d.x+=dx/di*2;d.y+=dy/di*2}}cx.fillStyle='#5d4037';cx.beginPath();cx.arc(d.x,d.y,6,0,7);cx.fill();if(Math.hypot(px-d.x,py-d.y)<13&&!inBush(px,py))end('bust')});
  }
  // player - fixed 32px, no squish
  cx.save();cx.translate(px,py);cx.scale(face,1);if(dir==='up')cx.filter='brightness(0.8)';else if(dir==='down')cx.filter='brightness(1.1)';cx.drawImage(curSpr,-16,-24,32,32);cx.restore();
  if(anim>0){anim--;cx.globalAlpha=anim/10;cx.fillStyle='#fff';cx.beginPath();cx.arc(px,py-26,1.5+anim/3,0,7);cx.fill();cx.globalAlpha=1}
  requestAnimationFrame(draw)
}draw();
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);if(e.key==='ArrowRight')mv(1,0);if(e.key==='ArrowUp')mv(0,-1);if(e.key==='ArrowDown')mv(0,1);if(e.code==='Space'){e.preventDefault();pk()}});
log('v5.3 loaded - paths restored, sprite fixed, trespass active');
})();</script></body></html>
