<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morel Forager v6.9.11</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root { --bg:#0e1116; --panel:rgba(18,22,28,0.85); --accent:#82c91e; --text:#e6edf3; --muted:#9aa4b2; }
  *{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;background:radial-gradient(1200px 800px at 50% -10%,#1a2330 0%,#0e1116 60%);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;display:flex;justify-content:center}
  .wrap{width:100%;max-width:1000px;padding:16px;display:flex;flex-direction:column;gap:12px}
  .top{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;justify-content:space-between;background:var(--panel);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 14px}
  .stats{display:flex;flex-wrap:wrap;gap:14px}.stat{display:flex;align-items:baseline;gap:6px;font-size:14px;color:var(--muted)}.stat b{color:var(--text);font-weight:600}
  .action{font-size:13px;color:#c8f5a5;background:rgba(130,201,30,0.1);border:1px solid rgba(130,201,30,0.25);padding:6px 10px;border-radius:8px}
  .canvas-wrap{position:relative;width:100%;max-width:960px;margin:0 auto;border-radius:16px;overflow:hidden;background:#0a0f14;border:1px solid rgba(255,255,255,0.08)}
  canvas{display:block;width:100%;height:auto;aspect-ratio:960/640;image-rendering:pixelated}
  .bottom{text-align:center;font-size:13px;color:var(--muted);background:var(--panel);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:8px 12px}
  kbd{display:inline-block;padding:2px 6px;margin:0 2px;background:#1c2330;border:1px solid rgba(255,255,255,0.15);border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="stats">
      <div class="stat"><span>Zone</span><b id="uiZone">1</b></div>
      <div class="stat"><span>Cash</span><b id="uiCash">$0</b></div>
      <div class="stat"><span>Bag</span><b id="uiBag">0/20</b></div>
      <div class="stat"><span>MP</span><b id="uiMP">100/100</b></div>
      <div class="stat"><span>Weather</span><b id="uiWeather">☀️</b></div>
    </div>
    <div class="action" id="uiAction">Welcome Forager!</div>
  </header>
  <div class="canvas-wrap"><canvas id="game" width="960" height="640"></canvas></div>
  <footer class="bottom"><span><kbd>↑↓←→</kbd> Move</span> • <span><kbd>SPACE</kbd> Poke</span> • <span><kbd>E</kbd> Pick</span> • <span><kbd>S</kbd> Sell</span></footer>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const maps = {
    1: { bg: new Image(), bush: new Image() },
    2: { bg: new Image(), bush: new Image() }
  };
  maps[1].bg.src = 'Map_1_BG.png';
  maps[1].bush.src = 'Map_1_Bushes.png';
  maps[2].bg.src = 'Map_2_BG.png';
  maps[2].bush.src = 'Map_2_Bushes.png';

  // Water and swamp puddles
  const waterPuddles = [];
  const swampPuddles = [];
  for (let i = 1; i <= 6; i++) {
    const w = new Image(); w.src = `Water_Puddles_${i}.png`; waterPuddles.push(w);
    const s = new Image(); s.src = `Swamp_Puddles_${i}.png`; swampPuddles.push(s);
  }
  const currentWater = Math.floor(Math.random() * 6);
  const currentSwamp = Math.floor(Math.random() * 6);

  // Grass tufts - only 1-4
  const grassImgs = [];
  for (let i = 1; i <= 4; i++) {
    const g = new Image(); g.src = `grasstuft_${i}.png`; grassImgs.push(g);
  }

  // Mushrooms - only the three you have
  const mushroomFiles = ['yellowmorel.png','blackmorel.png','falsemorel.png'];
  const mushImgs = {};
  mushroomFiles.forEach(f => { const im = new Image(); im.src = f; mushImgs[f] = im; });

  const sprites = { walk1:null, walk2:null, poke1:null, current:null, walkToggle:false };
  
  function makeWhiteTransparent(img, done) {
    const w = img.naturalWidth || 32, h = img.naturalHeight || 32;
    const c = document.createElement('canvas'); c.width = w; c.height = h;
    const cx = c.getContext('2d'); cx.drawImage(img,0,0);
    const id = cx.getImageData(0,0,w,h), d = id.data;
    for(let i=0;i<d.length;i+=4){ if(d[i]>240 && d[i+1]>240 && d[i+2]>240) d[i+3]=0; }
    cx.putImageData(id,0,0);
    const out = document.createElement('canvas'); out.width=32; out.height=32;
    const oc = out.getContext('2d'); oc.imageSmoothingEnabled=false;
    oc.drawImage(c,0,0,32,32);
    done(out);
  }

  function loadProcessed(src, key){
    const img = new Image();
    img.onload = () => makeWhiteTransparent(img, can => { sprites[key]=can; if(!sprites.current) sprites.current=can; });
    img.src = src;
  }
  loadProcessed('foragespritewalk1.png', 'walk1');
  loadProcessed('foragespritewalk2.png', 'walk2');
  loadProcessed('foragespritepoke1.png', 'poke1');

  let zone = 1, cash = 0, bag = [], mp = 100, maxMp = 100, lastAction = 'Welcome Forager!';
  let px = 480, py = 320, moveAcc = 0, lastMoveX = px, lastMoveY = py, isPoking = false;
  let mushrooms = [], grasses = [];

  function getType(f){
    f = f.toLowerCase();
    if(f.includes('yellow')) return 'yellow';
    if(f.includes('black')) return 'black';
    return 'falsemorel';
  }
  function getValue(t){ return t==='yellow'?5:t==='black'?7:-3; }

  function spawnMushrooms(){
    mushrooms = [];
    for(let i=0;i<40;i++){
      const x = 50 + Math.random()*860;
      const y = 80 + Math.random()*520;
      const file = mushroomFiles[Math.floor(Math.random()*mushroomFiles.length)];
      mushrooms.push({ x, y, file, type:getType(file), hidden: Math.random()<0.7, picked:false });
    }
    grasses = [];
    for(let i=0;i<90;i++){
      const m = mushrooms[i % mushrooms.length];
      const ox = (Math.random()-0.5)*8;
      const oy = (Math.random()-0.5)*6;
      grasses.push({ x: m.x-13+ox, y: m.y-11+oy, cleared:false, tuft: Math.floor(Math.random()*4) });
    }
  }

  const keys = {};
  window.addEventListener('keydown', e=>{
    keys[e.key.toLowerCase()] = true;
    if(e.code==='Space'){ e.preventDefault(); doPoke(); }
    if(e.key==='e') doPick();
    if(e.key==='s') doSell();
    if(e.key==='1'){ zone=1; spawnMushrooms(); }
    if(e.key==='2'){ zone=2; spawnMushrooms(); }
  });
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  function doPoke(){
    if(mp < 1) return;
    mp -= 1;
    isPoking = true;
    sprites.current = sprites.poke1;
    let cleared=0;
    grasses.forEach(g=>{
      if(!g.cleared && Math.hypot(g.x+13-px, g.y+11-py) < 28){
        g.cleared=true; cleared++;
        mushrooms.forEach(m=>{ if(!m.picked && Math.hypot(m.x-g.x-13,m.y-g.y-11)<26) m.hidden=false; });
      }
    });
    lastAction = cleared ? `Cleared ${cleared}` : 'Poke!';
    setTimeout(()=>{ isPoking=false; sprites.current=sprites.walk1; }, 200);
  }

  function doPick(){
    if(bag.length >= 20){ lastAction='Bag full'; return; }
    let nearest=null, nd=999;
    mushrooms.forEach(m=>{
      if(!m.picked && !m.hidden){
        const d=Math.hypot(m.x-px,m.y-py);
        if(d<26 && d<nd){ nearest=m; nd=d; }
      }
    });
    if(nearest){ nearest.picked=true; bag.push(nearest.type); lastAction=`Picked ${nearest.type}`; }
  }

  function doSell(){
    if(!bag.length) return;
    let total=0; bag.forEach(t=> total+=getValue(t));
    cash += Math.max(0,total);
    lastAction = `Sold +$${total}`;
    bag = [];
  }

  let lastT = performance.now();
  function update(dt){
    mp = Math.min(maxMp, mp + 0.25 * dt);
    let mx=0,my=0;
    if(keys['arrowleft']||keys['a']) mx-=1;
    if(keys['arrowright']||keys['d']) mx+=1;
    if(keys['arrowup']) my-=1;
    if(keys['arrowdown']) my+=1;
    if(mx||my){
      const len = Math.hypot(mx,my)||1;
      px += (mx/len) * 110 * dt;
      py += (my/len) * 110 * dt;
      px = Math.max(24, Math.min(936, px));
      py = Math.max(68, Math.min(616, py));
      const moved = Math.hypot(px-lastMoveX, py-lastMoveY);
      if(moved>0){
        moveAcc += moved; lastMoveX=px; lastMoveY=py;
        if(moveAcc>4){ moveAcc=0; sprites.walkToggle=!sprites.walkToggle; if(!isPoking) sprit
