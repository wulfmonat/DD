function spawn(){mushrooms.length=0;grasses.length=0;const p=[];for(let i=0;i<10;i++)p.push('y');for(let i=0;i<8;i++)p.push('b');for(let i=0;i<6;i++)p.push('f');['c1','c2','c3','bk1','bk2','sh','rg1','rg2','rg3','rs1','rs2','rs3'].forEach(x=>p.push(x));while(p.length<40)p.push('c1');for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}p.forEach(id=>{const m=M.find(x=>x.id===id);let x=90+Math.random()*780,y=90+Math.random()*460;if(m.w)y=360+Math.random()*180;if(m.s&&zone===1){x=200+Math.random()*560;y=320+Math.random()*200}const hid=Math.random()<0.6;mushrooms.push({x,y,m,got:0,hid,rev:!hid});if(hid){const g=IM['grass_'+(1+Math.floor(Math.random()*4))+'_36'];grasses.push({x:x-18,y:y-18,i:g,u:0})}});upd();log('Spawned 40 – your real art, grass hide active');}
function upd(){z.textContent=zone+1;c.textContent=cash;cnt.textContent=`Left: ${mushrooms.filter(m=>!m.got).length}`;}
function draw(){ctx.clearRect(0,0,960,640);const bg=zone?map2:map1;if(bg.complete)ctx.drawImage(bg,0,0,960,640);else{ctx.fillStyle='#223322';ctx.fillRect(0,0,960,640)}ctx.globalAlpha=.22;const w=zone?water2:water1;if(w.complete)ctx.drawImage(w,0,0,960,640);ctx.globalAlpha=.18;const s=zone?swamp2:swamp1;if(s.complete)ctx.drawImage(s,0,0,960,640);ctx.globalAlpha=1;grasses.forEach(g=>{if(!g.u&&g.i.complete)ctx.drawImage(g.i,g.x,g.y,36,36)});mushrooms.forEach(o=>{if(o.got||!o.rev)return;if(o.m.i.complete)ctx.drawImage(o.m.i,o.x-12,o.y-12,24,24)});const b=zone?bush2:bush1;if(b.complete)ctx.drawImage(b,0,0,960,640);const pw=(Date.now()>>180)%2?IM.foragespritewalk1:IM.foragespritewalk2;if(pw.complete)ctx.drawImage(pw,px-24,py-24,48,48);else{ctx.fillStyle='#4fc3f7';ctx.fillRect(px-12,py-12,24,24)}}
function poke(){let n=0;grasses.forEach(g=>{if(!g.u&&Math.hypot(g.x+18-px,g.y+18-py)<32){g.u=1;n++}});mushrooms.forEach(m=>{if(m.hid&&!m.rev&&Math.hypot(m.x-px,m.y-py)<30){m.rev=1;n++}});if(n)log('Revealed '+n)}
function pick(){mushrooms.forEach(o=>{if(!o.got&&o.rev&&Math.hypot(o.x-px,o.y-py)<26){o.got=1;cash+=o.m.v;log((o.m.v<0?'BAD ':'+')+o.m.id+' $'+o.m.v)}});upd()}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')py=Math.max(24,py-8);if(k==='s'||k==='arrowdown')py=Math.min(616,py+8);if(k==='a'||k==='arrowleft')px=Math.max(24,px-8);if(k==='d'||k==='arrowright')px=Math.min(936,px+8);if(e.key===' '){e.preventDefault();poke()}if(k==='e')pick();if(k==='r')spawn();if(k==='z'){zone=1;spawn()} });
spawn();setInterval(draw,100);
</script></body></html>
