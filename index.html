<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Morel Forager v5.9v - Fixed</title>
<style>
body{margin:0;background:#000;color:#dfd;font-family:system-ui;overflow:hidden}
#ui{position:absolute;top:8px;left:8px;background:#000c;padding:8px 12px;border-radius:8px;font-size:13px}
#ui b{color:#ffeb3b}
canvas{display:block;margin:0 auto;background:#111;image-rendering:pixelated}
#log{position:absolute;bottom:8px;left:8px;right:8px;height:70px;background:#000a;overflow:auto;padding:4px;font-size:11px;font-family:monospace}
</style>
</head>
<body>
<div id="ui">Zone:<b id="z">1</b> | Cash:$<b id="c">0</b> | <span id="cnt">Loading...</span></div>
<canvas id="g" width="960" height="640"></canvas>
<div id="log"></div>
<script>
const log = m=>{document.getElementById('log').innerHTML+=m+'<br>';}
const ctx=g.getContext('2d');

const SPRITES = {
 yellow:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAh0lEQVR4nGNgGOqAkQS1W7CI+VDDgi0MDAwM/68zeGNo1mTYSsgifBbgNJgUi3BZsIUYg3FYhGIJE6mGkAqwWUCW6xkY4MGJkhgGxAejFhC0wAcpXZMEBiSZEpWTL9/twalIV7kEb07G5wMfBiKCCylYsJZHxAQRoRITr/zwTKajFtDXApoDAJJjH6wqO21EAAAAAElFTkSuQmCC",
 black:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAkklEQVR4nGNgGOqAkQS1W7CI+VDDgi0MDAwMGhoa3ugSN27c2ErIInwW4DSYFItwWbCFGINxWIRiCROphpAKsFlAlusZGODBiZIYBsQHoxYQtMAHKV2TBAYkmRKVk1f1pOBUFFYyB29OZsFjgQ8DAwPDjRs3tjAwMODMF9iCBRkQE0SESky88sMzmY5aQF8LaA4A9ccqHEcJmFIAAAAASUVORK5CYII=",
 false:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAi0lEQVR4nGNgGOqAkQS1W7CI+VDDgi0MDAwMO/08vNEl3Dft2ErIInwW4DSYFItwWbCFGINxWIRiCROphpAKsFlAlusZGODBiZIYBsQHoxYQtMAHKV2TBAYkmRKVkyXTXHAqej5rD1k5GcWiS1t6cOYLPZ8SjGBBBsQEEaESE6/88EymoxbQ1wKaAwDpDie9fwY7tQAAAABJRU5ErkJggg==",
 player:"data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAZElEQVR4nGNkIBH8P9Pwn5AaRpMGRmLNYyLVAdQGow5gIaRAcdpntDjvJWgoup77Wbw408SAh8CoAwbcAQQTITpQOlVMVQcMeAiMOmDUAaMOGHXAqANGHTDqgFEHjDpgFAw4AABcxgzTWflCPwAAAABJRU5ErkJggg=="
};

let zone=0, cash=0, px=480, py=320;
const mushrooms=[];
let spawned={y:0,b:0,f:0,o:0}, collected={y:0,b:0,f:0,o:0};

const maps=[new Image(), new Image()];
maps[0].src='Map_1_BG.png';
maps[1].src='Map_2_BG.png';
const water=new Image(); water.src='Water_Puddles_1.png';
const swamp=new Image(); swamp.src='Swamp_Puddles_1.png';

const imgY=new Image(); imgY.src=SPRITES.yellow;
const imgB=new Image(); imgB.src=SPRITES.black;
const imgF=new Image(); imgF.src=SPRITES.false;
const imgP=new Image(); imgP.src=SPRITES.player;

function spawn(){
 mushrooms.length=0; spawned={y:0,b:0,f:0,o:0}; collected={y:0,b:0,f:0,o:0};
 const types=[];
 for(let i=0;i<10;i++) types.push('y');
 for(let i=0;i<8;i++) types.push('b');
 for(let i=0;i<6;i++) types.push('f');
 for(let i=0;i<16;i++) types.push('o');
 for(let i=types.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[types[i],types[j]]=[types[j],types[i]]}
 types.forEach(t=>{
   mushrooms.push({x:80+Math.random()*800,y:80+Math.random()*480,t,got:false});
   if(t==='y')spawned.y++; else if(t==='b')spawned.b++; else if(t==='f')spawned.f++; else spawned.o++;
 });
 updateUI();
}

function updateUI(){
 document.getElementById('z').textContent=zone+1;
 document.getElementById('c').textContent=cash;
 const pct=Math.round((spawned.y+spawned.b+spawned.f)/40*100);
 document.getElementById('cnt').textContent=`Spawned Y${spawned.y} B${spawned.b} F${spawned.f} O${spawned.o} (${pct}% morels) | Collected Y${collected.y} B${collected.b} F${collected.f} O${collected.o}`;
}

function draw(){
 ctx.clearRect(0,0,960,640);
 const map=maps[zone]||maps[0];
 if(map.complete&&map.naturalWidth) ctx.drawImage(map,0,0,960,640); else {ctx.fillStyle='#2a3a2a';ctx.fillRect(0,0,960,640)}
 ctx.globalAlpha=0.25; if(water.complete) ctx.drawImage(water,0,0,960,640);
 ctx.globalAlpha=0.18; if(swamp.complete) ctx.drawImage(swamp,0,0,960,640);
 ctx.globalAlpha=1;
 mushrooms.forEach(m=>{if(m.got)return; let im=null; if(m.t==='y')im=imgY; else if(m.t==='b')im=imgB; else if(m.t==='f')im=imgF; else im=imgY;
   if(im.complete) ctx.drawImage(im,m.x-12,m.y-12,24,24); else {ctx.fillStyle=m.t==='y'?'#ff0':m.t==='b'?'#333':m.t==='f'?'#c33':'#777'; ctx.fillRect(m.x-6,m.y-6,12,12)}
 });
 if(imgP.complete) ctx.drawImage(imgP,px-16,py-16,32,32); else {ctx.fillStyle='#4fc3f7';ctx.fillRect(px-12,py-12,24,24)}
}

function collect(){
 mushrooms.forEach(m=>{if(!m.got && Math.hypot(m.x-px,m.y-py)<24){m.got=true; if(m.t==='y'){cash+=5;collected.y++} else if(m.t==='b'){cash+=8;collected.b++} else if(m.t==='f'){cash+=1;collected.f++} else {cash+=3;collected.o++}}});
 updateUI();
}

addEventListener('keydown',e=>{
 const k=e.key.toLowerCase();
 if(k==='w'||k==='arrowup')py=Math.max(20,py-8);
 if(k==='s'||k==='arrowdown')py=Math.min(620,py+8);
 if(k==='a'||k==='arrowleft')px=Math.max(20,px-8);
 if(k==='d'||k==='arrowright')px=Math.min(940,px+8);
 if(e.key===' '){e.preventDefault();collect()}
 if(k==='r'){spawn();log('Respawned - check counter')}
 if(k==='z'){zone=1;px=100;py=100;spawn();log('Zone 2')}
 if(k==='e'){log('Sell all (auto-sold on collect)')}
 draw();
});

maps[0].onload=()=>{spawn();draw();log('v5.9v FIXED loaded - Map_1_BG.png OK. Maps 3-6 disabled to stop 404s. Mushrooms are embedded, no more missing PNGs.')};
setInterval(draw,100);
</script>
</body></html>
