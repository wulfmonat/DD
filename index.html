<!DOCTYPE html><html><head><meta charset=utf-8><title>Morel Forager v6.2</title>
<style>body{margin:0;background:#000;color:#dfd;font-family:monospace;overflow:hidden}#ui{position:absolute;top:8px;left:8px;background:#000c;padding:8px 12px;border-radius:6px;font-size:13px}#ui b{color:#ffeb3b}canvas{display:block;margin:0 auto;image-rendering:pixelated}#log{position:absolute;bottom:6px;left:8px;right:8px;height:68px;background:#0008;overflow:auto;padding:4px;font-size:11px}</style></head><body>
<div id=ui>Zone <b id=z>1</b> | $<b id=c>0</b> | <span id=cnt></span><br>WASD • SPACE poke • E pick • R respawn</div>
<canvas id=g width=960 height=640></canvas><div id=log></div>
<script>
const log=m=>{logEl.innerHTML+=m+'<br>'};const logEl=document.getElementById('log');const ctx=g.getContext('2d');
const SPR={};

const IM={};for(const k in SPR){IM[k]=new Image();IM[k].src=SPR[k];}
const map1=new Image();map1.src='Map_1_BG.png';const map2=new Image();map2.src='Map_2_BG.png';
const bush1=new Image();bush1.src='Map_1_Bushes.png';const bush2=new Image();bush2.src='Map_2_Bushes.png';

let zone=0,cash=0,px=480,py=320;const mushrooms=[],grasses=[];
const M=[{id:'y',v:5,i:IM.yellowmorel_24},{id:'b',v:8,i:IM.blackmorel},{id:'f',v:1,i:IM.falsemorel},{id:'c1',v:3,i:IM.chanterelle_1},{id:'c2',v:3,i:IM.chanterelle_2},{id:'c3',v:3,i:IM.chanterelle_3},{id:'bk1',v:4,i:IM.bolete_king_1},{id:'bk2',v:4,i:IM.bolete_king_2},{id:'sh',v:4,i:IM.shiitake_1},{id:'rg1',v:-1,i:IM.russula_green_1},{id:'rg2',v:-1,i:IM.russula_green_2},{id:'rg3',v:-1,i:IM.russula_green_3},{id:'rs1',v:1,i:IM.russula_sickener_1},{id:'rs2',v:1,i:IM.russula_sickener_2},{id:'rs3',v:1,i:IM.russula_sickener_3}];

function spawn(){mushrooms.length=0;grasses.length=0;const p=[];for(let i=0;i<10;i++)p.push('y');for(let i=0;i<8;i++)p.push('b');for(let i=0;i<6;i++)p.push('f');['c1','c2','c3','bk1','bk2','sh','rg1','rg2','rg3','rs1','rs2','rs3'].forEach(x=>p.push(x));while(p.length<40)p.push('c1');for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]]}p.forEach(id=>{const m=M.find(x=>x.id===id);let x=100+Math.random()*760,y=120+Math.random()*400;const hid=Math.random()<0.65;mushrooms.push({x,y,m,got:0,hid,rev:!hid});if(hid){const gi='grass_'+(1+Math.floor(Math.random()*4));grasses.push({x:x-14,y:y-14,i:IM[gi],u:0})}});upd();log('Spawned 40 – grass cleaned, mushrooms peek out')}
function upd(){z.textContent=zone+1;c.textContent=cash;cnt.textContent=`Left: ${mushrooms.filter(m=>!m.got).length}`}
function draw(){ctx.clearRect(0,0,960,640);const bg=zone?map2:map1;if(bg.complete)ctx.drawImage(bg,0,0,960,640);else{ctx.fillStyle='#3a5a3a';ctx.fillRect(0,0,960,640)} // draw mushrooms first (peek)
mushrooms.forEach(o=>{if(o.got)return;if(o.hid&&!o.rev){ctx.globalAlpha=0.9;if(o.m.i.complete)ctx.drawImage(o.m.i,o.x-6,o.y-4,12,12);ctx.globalAlpha=1}else if(o.rev){if(o.m.i.complete)ctx.drawImage(o.m.i,o.x-12,o.y-12,24,24)}}); // grass on top
grasses.forEach(g=>{if(!g.u&&g.i.complete)ctx.drawImage(g.i,g.x,g.y,28,28)});const b=zone?bush2:bush1;if(b.complete)ctx.drawImage(b,0,0,960,640); // player – simple visible forager
ctx.fillStyle='#1e90ff';ctx.beginPath();ctx.arc(px,py,14,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();ctx.fillStyle='#fff';ctx.fillRect(px-2,py-18,4,8)}
function poke(){let n=0;grasses.forEach(g=>{if(!g.u&&Math.hypot(g.x+14-px,g.y+14-py)<28){g.u=1;n++}});mushrooms.forEach(m=>{if(m.hid&&!m.rev&&Math.hypot(m.x-px,m.y-py)<26){m.rev=1;n++}});if(n)log('Poked '+n)}
function pick(){mushrooms.forEach(o=>{if(!o.got&&o.rev&&Math.hypot(o.x-px,o.y-py)<24){o.got=1;cash+=o.m.v;log((o.m.v<0?'BAD ':'+')+o.m.id)}});upd()}
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(k==='w'||k==='arrowup')py=Math.max(30,py-7);if(k==='s'||k==='arrowdown')py=Math.min(610,py+7);if(k==='a'||k==='arrowleft')px=Math.max(30,px-7);if(k==='d'||k==='arrowright')px=Math.min(930,px+7);if(e.key===' '){e.preventDefault();poke()}if(k==='e')pick();if(k==='r')spawn();if(k==='z'){zone=1;spawn()}});
spawn();setInterval(draw,80);
</script></body></html>
