<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morel Forager v5.9u</title>
<style>
 html,body{margin:0;background:#0b0e0a;height:100%;overflow:hidden;font-family:monospace;color:#cfe8cf}
 canvas{display:block;margin:0 auto;image-rendering:pixelated;width:min(96vw,1280px);height:auto;aspect-ratio:1280/704;background:#122012;border:2px solid #2a3a2a}
 #log{position:fixed;left:8px;bottom:6px;font-size:12px}
 #ui{position:fixed;left:8px;top:6px;font-size:14px}
</style>
</head>
<body>
<canvas id="c" width="1280" height="704"></canvas>
<div id="ui"></div>
<div id="log">v5.9u - water visible, boots work</div>
<script>
const W=1280,H=704, c=document.getElementById('c'), x=c.getContext('2d');
const ui=document.getElementById('ui'), log=document.getElementById('log');
const gear={muck:true};
let cash=0, zone=1, inv={Y:0,B:0,F:0}, px=94, py=640;

const imgs={};
['Map_1_BG.png','Map_1_Path.png','Water_Puddles_1.png','Swamp_Puddles_1.png',
 'Map_2_BG.png','Map_2_Path.png','Water_Puddles_2.png','Swamp_Puddles_2.png',
 'foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png',
 'yellowmorel.png','blackmorel.png','falsemorel.png','grasstuft.png'].forEach(s=>{
  const im=new Image(); im.src=s+'?v=59u'; imgs[s]=im;
});

function getMask(img,xx,yy){
  if(!img||!img.complete) return 0;
  try{
    const t=document.createElement('canvas'); t.width=1;t.height=1;
    const tc=t.getContext('2d'); tc.drawImage(img,xx,yy,1,1,0,0,1,1);
    return tc.getImageData(0,0,1,1).data[0];
  }catch(e){return 0}
}
function canWalk(nx,ny){
  const path = zone===1?imgs['Map_1_Path.png']:imgs['Map_2_Path.png'];
  const water = zone===1?imgs['Water_Puddles_1.png']:imgs['Water_Puddles_2.png'];
  const swamp = zone===1?imgs['Swamp_Puddles_1.png']:imgs['Swamp_Puddles_2.png'];
  const p = getMask(path,nx,ny);
  const w = getMask(water,nx,ny);
  const s = getMask(swamp,nx,ny);
  // path black (<50) = trail, always ok
  if(p<50) return true;
  // off-trail but water/swamp and boots = ok
  if((w>200 || s>200) && gear.muck) return true;
  return false;
}
function walk(dx,dy){
  const nx=px+dx, ny=py+dy;
  if(nx<0||ny<0||nx>=W||ny>=H) return;
  if(!canWalk(nx,ny)){ log.textContent='Stay on trail (or need boots for water)'; return; }
  px=nx; py=ny;
  if(zone===1 && px>1260){zone=2;px=20;py=360;}
  log.textContent='v5.9u - water visible, boots work | MUCK BOOTS ACTIVE';
}
function draw(){
  x.clearRect(0,0,W,H);
  const bg=zone===1?imgs['Map_1_BG.png']:imgs['Map_2_BG.png'];
  if(bg&&bg.complete) x.drawImage(bg,0,0,W,H);
  // draw water overlay for debugging so you can SEE it
  const water=zone===1?imgs['Water_Puddles_1.png']:imgs['Water_Puddles_2.png'];
  if(water&&water.complete){
    x.globalAlpha=0.35; x.fillStyle='#1e90ff';
    // draw blue where mask white - simple: draw image tinted
    x.drawImage(water,0,0,W,H);
    x.globalAlpha=1;
  }
  x.fillStyle='#7CFC00'; x.fillRect(px-8,py-16,16,24);
  ui.innerHTML=`Cash:$${cash} Zone:${zone} Y:${inv.Y} B:${inv.B} F:${inv.F} Boots:ON<br>WASD move | E sell`;
}
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='a'||k==='arrowleft') walk(-4,0);
  if(k==='d'||k==='arrowright') walk(4,0);
  if(k==='w'||k==='arrowup') walk(0,-4);
  if(k==='s'||k==='arrowdown') walk(0,4);
  if(k==='e'){ const t=inv.Y*5+inv.B*8+inv.F; cash+=t; inv={Y:0,B:0,F:0}; log.textContent=`Sold for $${t}`; }
});
function loop(){ draw(); requestAnimationFrame(loop);} loop();
</script>
</body>
</html>
