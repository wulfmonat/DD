<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Morel Forager v5.6b</title>
<style>body{margin:0;background:#0a0f0a;color:#d7f0d7;font-family:system-ui;overflow:hidden}#ui{position:absolute;top:8px;left:8px;background:#000a;padding:8px 10px;border-radius:8px;font-size:14px;z-index:10}#log{position:absolute;bottom:8px;left:8px;right:8px;height:80px;background:#000a;overflow:auto;padding:6px;font-size:12px}canvas{display:block;margin:0 auto;background:#000}</style></head><body>
<div id="ui">Zone:<b id="zone">1</b> Cash:$<b id="cash">0</b> Bag:<b id="bag">0</b>/20 MP:<b id="mp">100</b></div>
<canvas id="c" width="800" height="600"></canvas><div id="log"></div>
<script>
const $=i=>document.getElementById(i),ctx=c.getContext('2d'),log=m=>{logd.innerHTML+=m+'<br>';logd.scrollTop=1e9},logd=$('log');
let cash=0,bagMax=20,mp=100,cur=0,px=50,py=545,facing=1,lastDir='down',trespass=false,curSpr,lastTele=0;
const gear={boots:0,waders:0,swamp:0};
const teles=[{from:0,x:790,y:514,to:1,nx:47,ny:521,r:32},{from:1,x:10,y:514,to:0,nx:744,ny:528,r:32},{from:1,x:790,y:55,to:2,nx:69,ny:70,r:32},{from:2,x:35,y:61,to:1,nx:754,ny:68,r:32},{from:2,x:680,y:590,to:3,nx:685,ny:64,r:32},{from:3,x:680,y:10,to:2,nx:711,ny:568,r:32},{from:3,x:10,y:545,to:4,nx:749,ny:557,r:28},{from:4,x:790,y:545,to:3,nx:50,ny:553,r:28},{from:4,x:10,y:104,to:5,nx:749,ny:111,r:28},{from:5,x:790,y:102,to:4,nx:43,ny:120,r:28},{from:5,x:10,y:540,to:0,nx:36,ny:560,r:28}];
const bg=[],bu=[],wa=[],sw=[],mo=[[],[],[],[],[],[]];
const ld=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=s});const sp=s=>ld(s);
const hit=(c,x,y)=>{if(!c)return 0;if(!c.c)c.c=c.getContext('2d',{willReadFrequently:1});try{return c.c.getImageData(x,y,1,1).data[3]}catch(e){return 0}}
async function init(){[w1,w2,p1,ym,bm,fm]=await Promise.all('foragespritewalk1.png foragespritewalk2.png foragespritepoke1.png yellowmorel.png blackmorel.png falsemorel.png'.split(' ').map(sp));curSpr=w1;for(let i=0;i<6;i++){bg[i]=await ld(`Map_${i+1}_BG.png`);bu[i]=await ld(`Map_${i+1}_Bushes.png`);wa[i]=await ld(`Water_Puddles_${i+1}.png`);sw[i]=await ld(`Swamp_Puddles_${i+1}.png`);spn(i)}upd();drw();log('v5.6b - movement fixed')}
function spn(z){mo[z]=[];for(let i=0;i<14;i++)mo[z].push({x:100+Math.random()*600,y:100+Math.random()*400,t:Math.random()<.6?'y':Math.random()<.85?'b':'f',r:0})}
function walk(x,y){if(x<5||x>795||y<5||y>595)return 0;if(hit(wa[cur],x,y)>10)return gear.waders;if(hit(sw[cur],x,y)>10)return gear.swamp;return 1}
function chk(){const n=Date.now();if(n-lastTele<800)return;for(const t of teles)if(cur===t.from&&Math.hypot(px-t.x,py-t.y)<t.r){lastTele=n;cur=t.to;px=t.nx;py=t.ny;$('zone').textContent=cur+1;log('Zone '+(cur+1));spn(cur);break}}
function mv(dx,dy){const nx=px+dx*3.2,ny=py+dy*3.2;if(!walk(nx,ny))return;px=nx;py=ny;if(dx)facing=dx>0?1:-1;lastDir=dy<0?'up':dy>0?'down':lastDir;curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.boots?0.04:0.08;if(mp<0)mp=0}chk();upd()}
function upd(){$('cash').textContent=cash;$('bag').textContent=bag;$('mp').textContent=Math.floor(mp);drw()}
function drw(){ctx.clearRect(0,0,800,600);if(bg[cur])ctx.drawImage(bg[cur],0,0,800,600);mo[cur].forEach(m=>{if(!m.r){ctx.fillStyle='#142';ctx.fillRect(m.x-2,m.y-2,4,4)}else{ctx.drawImage(m.t==='y'?ym:m.t==='b'?bm:fm,m.x-8,m.y-12,16,16)}});if(bu[cur])ctx.drawImage(bu[cur],0,0,800,600);ctx.save();ctx.translate(px,py);ctx.scale(facing,1);ctx.globalAlpha=lastDir==='up'?0.7:1;ctx.drawImage(curSpr,-16,-24,32,32);ctx.restore()}
function poke(){const o=curSpr;curSpr=p1;drw();setTimeout(()=>{curSpr=o;drw()},120);mo[cur].forEach(m=>{if(!m.r&&Math.hypot(m.x-px,m.y-py)<24){m.r=1;if(m.t!=='f'&&bag<bagMax){bag++;cash+=m.t==='y'?15:25}}});upd()}
addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();poke();return}const k={w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]}[e.key.toLowerCase()];if(k)mv(k[0],k[1]);if(e.key.toLowerCase()==='t')trespass=!trespass});
init();
</script></body></html>
