<!DOCTYPE html><html><head><meta charset="utf-8"><title>Morel Hunter v5.3</title><style>body{margin:0;background:#0a0c0f;color:#d8e0d8;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px 12px;margin:6px;background:#12161c;border:1px solid #222;border-radius:8px;flex-wrap:wrap}#hud b{color:#fff}.pill{padding:2px 6px;border-radius:99px;font-size:11px;display:none}#hide{background:#16341f;color:#a0ffb0}#alert{background:#3a1818;color:#ff9a9a}#game{width:1100px;height:825px;max-width:96vw;max-height:72vh;background:#000;border:1px solid #222;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:6px;flex-wrap:wrap}button{background:#171b22;color:#ddd;border:1px solid #2a323c;padding:7px 11px;border-radius:7px;cursor:pointer;font:inherit}button:hover{background:#1f2530}#log{width:1100px;max-width:96vw;height:110px;overflow:auto;background:#0e1116;border:1px solid #1c222b;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">1</b> Day:<b id="day">1</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Bag:<b id="bag">0/18</b> Scent:<b id="scent">0</b> <span id="hide" class="pill">HIDING</span> <span id="alert" class="pill">SPOTTED</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE [Space]</button><button onclick="sell()">SELL</button><button onclick="toggleTrespass()">TRESPASS</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=80,py=540,bag=[],cash=75,mp=100,maxBag=18,facing=1,lastDir='down',pickAnim=0,day=1,trespass=false,scentTrail=[];
const bg=[],bush=[],water=[],swamp=[],morels=[[],[],[],[]],walks=[];
const gear={boots:false,waders:true,swamp:true};
let guards=[],dogs=[];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=i=>document.getElementById(i),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};

async function load(n){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+n})}
async function spr(n){const i=new Image();i.crossOrigin='anonymous';i.src=BASE+n;return new Promise(r=>{i.onload=()=>{const c=document.createElement('canvas');c.width=64;c.height=64;const g=c.getContext('2d');g.imageSmoothingEnabled=false;g.drawImage(i,0,0,64);r(c)};i.onerror=()=>r(null)})}
const [w1,w2,p1]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png'].map(spr));let curSpr=w1;

for(let i=0;i<6;i++){
  bg[i]=await load(`Map_${i+1}_BG.png`);
  bush[i]=await load(`Map_${i+1}_Bushes.png`);
  water[i]=await load(`Water_Puddles_${i+1}.png`);
  swamp[i]=await load(`Swamp_Puddles_${i+1}.png`);
  if(bg[i]){const d=bg[i].getContext('2d').getImageData(0,0,800,600).data;const m=new Uint8Array(800*600);for(let p=0;p<800*600;p++){const o=p*4;const r=d[o],g=d[o+1],b=d[o+2];m[p]=(r>160&&g>130&&b<190)?1:0}walks[i]=m}
}
function a(c,x,y){return c?c.getContext('2d').getImageData(x,y,1,1).data[3]>10:false}
function canWalk(x,y){if(x<5||y<5||x>795||y>595)return false;if(a(bush[cur],x,y))return true;if(water[cur]&&a(water[cur],x,y))return gear.waders;if(swamp[cur]&&a(swamp[cur],x,y))return gear.swamp;return walks[cur]?walks[cur][Math.floor(y)*800+Math.floor(x)]===1:true}
function upd(){$('zone').textContent=cur+1;$('day').textContent=day;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('bag').textContent=bag.length+'/'+maxBag;$('scent').textContent=scentTrail.length;$('hide').style.display=(trespass&&a(bush[cur],px,py))?'inline-block':'none';$('alert').style.display=guards.some(g=>inCone(g))?'inline-block':'none'}
function spawn(z){if(morels[z].length)return;for(let i=0;i<22;i++){let t=0;while(t++<500){const x=40+Math.random()*720,y=40+Math.random()*520;if(canWalk(x,y)&&a(bush[z],x,y)){morels[z].push({x,y,type:Math.random()<.68?'yellow':'black',revealed:false});break}}}}
function inCone(g){const dx=px-g.x,dy=py-g.y,d=Math.hypot(dx,dy);if(d>85||a(bush[cur],px,py))return false;const ang=Math.atan2(dy,dx);let da=Math.abs(((ang-g.ang+Math.PI*3)%(2*Math.PI))-Math.PI);return da<1.05}
function guardStep(g){g.x+=g.vx;g.y+=g.vy;if(g.x<35||g.x>765||!canWalk(g.x,g.y)){g.vx*=-1;g.x=Math.max(35,Math.min(765,g.x))}if(g.y<35||g.y>565||!canWalk(g.x,g.y)){g.vy*=-1;g.y=Math.max(35,Math.min(565,g.y))}g.ang=Math.atan2(g.vy,g.vx)}
function dogStep(d){if(!scentTrail.length)return;const t=scentTrail[0];const dx=t.x-d.x,dy=t.y-d.y,dist=Math.hypot(dx,dy);if(dist>2){d.x+=dx/dist*2.3;d.y+=dy/dist*2.3;if(!canWalk(d.x,d.y)){d.x-=dx/dist*2.3;d.y-=dy/dist*2.3}}}

window.mv=(dx,dy)=>{const nx=px+dx*3.2,ny=py+dy*3.2;if(!canWalk(nx,ny))return;px=nx;py=ny;if(dx<0)facing=-1;if(dx>0)facing=1;if(dy<0)lastDir='up';if(dy>0)lastDir='down';curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.boots?0.035:0.07;scentTrail.push({x:px,y:py,t:Date.now()});if(scentTrail.length>280)scentTrail.shift();if(mp<=0)endTrespass('exhausted')}upd()}
window.poke=()=>{curSpr=p1;setTimeout(()=>curSpr=w1,140);const m=morels[cur].find(o=>!o.revealed&&Math.hypot(px-o.x,py-o.y)<22);if(m){m.revealed=true;mp-=0.8;log('Revealed '+m.type);upd();return}const n=morels[cur].find(o=>o.revealed&&Math.hypot(px-o.x,py-o.y)<22);if(n){morels[cur]=morels[cur].filter(x=>x!==n);if(bag.length<maxBag){bag.push(n.type);mp-=gear.boots?0.4:0.8;pickAnim=14;log('Picked '+n.type+(trespass?' *HOT*':''))}}upd()}
window.sell=()=>{const v=bag.reduce((s,t)=>s+(t==='yellow'?8:13)*(trespass?2:1),0);cash+=v;bag=[];log('Sold $'+v);upd()}
window.toggleTrespass=()=>{if(trespass){endTrespass('left');return}if(cur===0){log('Woods is safe');return}trespass=true;mp=100;scentTrail=[];guards=[];dogs=[];for(let i=0;i<2;i++)guards.push({x:150+Math.random()*500,y:120+Math.random()*360,vx:(Math.random()-0.5)*2.4,vy:(Math.random()-0.5)*2.4,ang:0});for(let i=0;i<2;i++)dogs.push({x:390+Math.random()*20,y:290+Math.random()*20});log('TRESPASS ON');upd()}
function endTrespass(r){if(!trespass)return;trespass=false;if(r==='bust'){const fine=35+Math.floor(Math.random()*35);cash=Math.max(0,cash-fine);bag=[];log('BUSTED! -$'+fine)}day++;guards=[];dogs=[];scentTrail=[];cur=0;px=80;py=540;spawn(0);upd()}

spawn(0);upd();
setInterval(()=>{if(mp<100&&!trespass){mp=Math.min(100,mp+0.3);upd()}},1000);

function draw(){ctx.clearRect(0,0,800,600);if(bg[cur])ctx.drawImage(bg[cur],0,0);
 if(water[cur]&&gear.waders){ctx.globalAlpha=.17;ctx.drawImage(water[cur],0,0);ctx.globalCompositeOperation='lighter';ctx.fillStyle='#7ec8ff';ctx.globalAlpha=.05;ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(swamp[cur]&&gear.swamp){ctx.globalAlpha=.14;ctx.drawImage(swamp[cur],0,0);ctx.globalCompositeOperation='lighter';ctx.fillStyle='#7CFF7C';ctx.globalAlpha=.045;ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(bush[cur])ctx.drawImage(bush[cur],0,0);
 morels[cur].forEach(m=>{if(!m.revealed){ctx.fillStyle='#0f1a0f';ctx.fillRect(m.x-4,m.y-4,8);ctx.fillStyle='#1c2e1c';ctx.fillRect(m.x-3,m.y-3,6,6)}else{ctx.fillStyle=m.type==='yellow'?'#ffdb6e':'#3e2a22';ctx.beginPath();ctx.arc(m.x,m.y,5.5,0,7);ctx.fill();ctx.fillStyle='#1a0f08';ctx.beginPath();ctx.arc(m.x,m.y,2.2,0,7);ctx.fill()}});
 if(trespass){scentTrail=scentTrail.filter(s=>Date.now()-s.t<(gear.boots?3000:5000));ctx.lineWidth=2;ctx.strokeStyle='rgba(210,180,120,0.13)';scentTrail.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,2,0,7);ctx.stroke()});guards.forEach(g=>{guardStep(g);ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.ang);ctx.fillStyle='rgba(255,240,150,0.11)';ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,85,-1.05,1.05);ctx.lineTo(0,0);ctx.fill();ctx.restore();ctx.fillStyle='#d63b3b';ctx.beginPath();ctx.arc(g.x,g.y,6.5,0,7);ctx.fill();if(inCone(g))endTrespass('bust')});dogs.forEach(d=>{dogStep(d);ctx.fillStyle='#4e342e';ctx.beginPath();ctx.arc(d.x,d.y,6.5,0,7);ctx.fill();if(Math.hypot(px-d.x,py-d.y)<14&&!a(bush[cur],px,py))endTrespass('bust')})}
 ctx.save();ctx.translate(px,py);ctx.scale(facing,1);if(lastDir==='up')ctx.filter='brightness(0.78)';else if(lastDir==='down')ctx.filter='brightness(1.12)';ctx.drawImage(curSpr,-32,-48,64,64);ctx.restore();
 if(pickAnim>0){pickAnim--;ctx.globalAlpha=pickAnim/14;ctx.fillStyle='#fff8';ctx.beginPath();ctx.arc(px,py-30,3,0,7);ctx.fill();ctx.globalAlpha=1}
 requestAnimationFrame(draw)}draw();
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);if(e.key==='ArrowRight')mv(1,0);if(e.key==='ArrowUp')mv(0,-1);if(e.key==='ArrowDown')mv(0,1);if(e.code==='Space'){e.preventDefault();poke()}});
})();</script></body></html>
