<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Morel Forager v6.9.11</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{--bg:#0e1116;--panel:rgba(18,22,28,0.85);--accent:#82c91e;--text:#e6edf3;--muted:#9aa4b2}*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;background:radial-gradient(1200px 800px at 50% -10%,#1a2330 0%,#0e1116 60%);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;display:flex;justify-content:center}.wrap{width:100%;max-width:1000px;padding:16px;display:flex;flex-direction:column;gap:12px}.top{display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center;justify-content:space-between;background:var(--panel);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:10px 14px}.stats{display:flex;flex-wrap:wrap;gap:14px}.stat{display:flex;align-items:baseline;gap:6px;font-size:14px;color:var(--muted)}.stat b{color:var(--text);font-weight:600}.action{font-size:13px;color:#c8f5a5;background:rgba(130,201,30,0.1);border:1px solid rgba(130,201,30,0.25);padding:6px 10px;border-radius:8px}.canvas-wrap{position:relative;width:100%;max-width:960px;margin:0 auto;border-radius:16px;overflow:hidden;background:#0a0f14;border:1px solid rgba(255,255,255,0.08)}canvas{display:block;width:100%;height:auto;aspect-ratio:960/640;image-rendering:pixelated}.bottom{text-align:center;font-size:13px;color:var(--muted);background:var(--panel);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:8px 12px}kbd{display:inline-block;padding:2px 6px;margin:0 2px;background:#1c2330;border:1px solid rgba(255,255,255,0.15);border-radius:6px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
<header class="top"><div class="stats"><div class="stat"><span>Zone</span><b id="uiZone">1</b></div><div class="stat"><span>Cash</span><b id="uiCash">$0</b></div><div class="stat"><span>Bag</span><b id="uiBag">0/20</b></div><div class="stat"><span>MP</span><b id="uiMP">100/100</b></div><div class="stat"><span>Weather</span><b id="uiWeather">☀️</b></div></div><div class="action" id="uiAction">Welcome Forager!</div></header>
<div class="canvas-wrap"><canvas id="game" width="960" height="640"></canvas></div>
<footer class="bottom"><span><kbd>↑↓←→</kbd> Move</span> • <span><kbd>SPACE</kbd> Poke</span> • <span><kbd>E</kbd> Pick</span> • <span><kbd>S</kbd> Sell</span></footer>
</div>
<script>
(()=>{const c=document.getElementById('game'),x=c.getContext('2d');x.imageSmoothingEnabled=false;
const maps={1:{bg:new Image(),bush:new Image()},2:{bg:new Image(),bush:new Image()}};
maps[1].bg.src='Map_1_BG.png';maps[1].bush.src='Map_1_Bushes.png';maps[2].bg.src='Map_2_BG.png';maps[2].bush.src='Map_2_Bushes.png';
const waterPuddles=[];for(let i=1;i<=6;i++){const im=new Image();im.src=`Water_Puddles_${i}.png`;waterPuddles.push(im)}
const swampPuddles=[];for(let i=1;i<=6;i++){const im=new Image();im.src=`Swamp_Puddles_${i}.png`;swampPuddles.push(im)}
let currentWater=Math.floor(Math.random()*6),currentSwamp=Math.floor(Math.random()*6);
const GRASS_TUFTS=['grasstuft_1.png','grasstuft_2.png','grasstuft_3.png','grasstuft_4.png'].map(s=>{const i=new Image();i.src=s;return i});
const files=['yellowmorel.png','blackmorel.png','falsemorel.png'];const mush={};files.forEach(f=>{const im=new Image();im.src=f;mush[f]=im});
const spr={w1:null,w2:null,p1:null,cur:null,t:false};function proc(img,d){const w=img.naturalWidth||32,h=img.naturalHeight||32,ca=document.createElement('canvas');ca.width=w;ca.height=h;const cx=ca.getContext('2d');cx.drawImage(img,0,0);const id=cx.getImageData(0,0,w,h),d2=id.data;let minX=w,minY=h,maxX=0,maxY=0,has=false;for(let y=0;y<h;y++)for(let xx=0;xx<w;xx++){const i=(y*w+xx)*4,r=d2[i],g=d2[i+1],b=d2[i+2];if(r>240&&g>240&&b>240)d2[i+3]=0;else{has=true;if(xx<minX)minX=xx;if(y<minY)minY=y;if(xx>maxX)maxX=xx;if(y>maxY)maxY=y}}cx.putImageData(id,0,0);const cw=has?maxX-minX+1:w,ch=has?maxY-minY+1:h,cr=document.createElement('canvas');cr.width=cw;cr.height=ch;cr.getContext('2d').drawImage(ca,minX,minY,cw,ch,0,0,cw,ch);const o=document.createElement('canvas');o.width=32;o.height=32;const oc=o.getContext('2d');oc.imageSmoothingEnabled=false;const s=Math.min(32/cw,32/ch);oc.drawImage(cr,(32-cw*s)/2,(32-ch*s)/2,cw*s,ch*s);d(o)}function load(s,k){const i=new Image();i.onload=()=>proc(i,c=>{spr[k]=c;if(!spr.cur)spr.cur=c});i.src=s}load('foragespritewalk1.png','w1');load('foragespritewalk2.png','w2');load('foragespritepoke1.png','p1');
let zone=1,cash=0,bag=[],mp=100,mxP=100,act='Welcome!',px=480,py=320,acc=0,lx=px,ly=py,poking=false,mushs=[],grass=[];
function type(f){f=f.toLowerCase();if(f.includes('yellow'))return'yellow';if(f.includes('black'))return'black';return'falsemorel'}function val(t){return t==='yellow'?5:t==='black'?7:-3}
function spawn(){mushs=[];for(let i=0;i<40;i++){const f=files[Math.floor(Math.random()*3)],xx=50+Math.random()*860,yy=80+Math.random()*520;mushs.push({x:xx,y:yy,f,type:type(f),hid:Math.random()<0.75,pick:false})}grass=[];for(let i=0;i<80;i++){const m=mushs[i%mushs.length],ox=(Math.random()-0.5)*8,oy=(Math.random()-0.5)*6;grass.push({x:m.x-13+ox,y:m.y-11+oy,clr:false,t:Math.floor(Math.random()*4)})}}
const keys={};addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.code==='Space'){e.preventDefault();poke()}if(e.key==='e')pick();if(e.key==='s')sell();if(e.key==='1'){zone=1;spawn()}if(e.key==='2'){zone=2;spawn()}});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
function poke(){if(mp<1)return;mp--;poking=true;spr.cur=spr.p1;let c=0;grass.forEach(g=>{if(!g.clr&&Math.hypot(g.x+13-px,g.y+11-py)<28){g.clr=true;c++;mushs.forEach(m=>{if(!m.pick&&Math.hypot(m.x-g.x-13,m.y-g.y-11)<26)m.hid=false})}});act=c?`Cleared ${c}`:'Poke!';setTimeout(()=>{poking=false;spr.cur=spr.w1},200)}
function pick(){if(bag.length>=20){act='Bag full';return}let n=null,d=999;mushs.forEach(m=>{if(!m.pick&&!m.hid){const dd=Math.hypot(m.x-px,m.y-py);if(dd<26&&dd<d){n=m;d=dd}}});if(n){n.pick=true;bag.push(n.type);act=`Picked ${n.type}`}}
function sell(){if(!bag.length)return;let t=0;bag.forEach(b=>t+=val(b));cash+=Math.max(0,t);act=`Sold +$${t}`;bag=[]}
function upd(dt){mp=Math.min(mxP,mp+0.25*dt);let mx=0,my=0;if(keys.arrowleft||keys.a)mx--;if(keys.arrowright||keys.d)mx++;if(keys.arrowup)my--;if(keys.arrowdown)my++;if(mx||my){const l=Math.hypot(mx,my);px+=mx/l*110*dt;py+=my/l*110*dt;px=Math.max(24,Math.min(936,px));py=Math.max(68,Math.min(616,py));const mv=Math.hypot(px-lx,py-ly);if(mv){acc+=mv;lx=px;ly=py;if(acc>4){acc=0;spr.t=!spr.t;if(!poking)spr.cur=spr.t?spr.w2||spr.w1:spr.w1}}}}}
function draw(){x.clearRect(0,0,960,640);const m=maps[zone];if(m.bg.complete)x.drawImage(m.bg,0,0,960,640);else{x.fillStyle=zone===1?'#7cb342':'#3e5c54';x.fillRect(0,0,960,640)}const pud=zone===1?waterPuddles[currentWater]:swampPuddles[currentSwamp];if(pud&&pud.complete)x.drawImage(pud,0,0,960,640);
mushs.forEach(ms=>{if(ms.pick)return;const im=mush[ms.f];if(ms.hid){if(im.complete)x.drawImage(im,ms.x-9,ms.y-5,18,10);else{x.fillStyle='#f9a825';x.fillRect(ms.x-9,ms.y-5,18,10)}}else{if(im.complete)x.drawImage(im,ms.x-11,ms.y-11,22,22);else{x.fillStyle='#fdd835';x.fillRect(ms.x-11,ms.y-11,22,22)}}});
grass.forEach(g=>{if(g.clr)return;const gt=GRASS_TUFTS[g.t];if(gt.complete)x.drawImage(gt,g.x,g.y,26,22);else{x.fillStyle='#2e7d32';x.fillRect(g.x,g.y,26,22)}});
if(spr.cur)x.drawImage(spr.cur,px-16,py-16,32,32);else{x.beginPath();x.arc(px,py,7,0,7);x.fillStyle='#d32f2f';x.fill()}
if(m.bush.complete)x.drawImage(m.bush,0,0,960,640)}
function ui(){document.getElementById('uiZone').textContent=zone;document.getElementById('uiCash').textContent='$'+cash;document.getElementById('uiBag').textContent=bag.length+'/20';document.getElementById('uiMP').textContent=Math.floor(mp)+'/100';document.getElementById('uiAction').textContent=act}
let lt=performance.now();function loop(t){const dt=Math.min(0.033,(t-lt)/1000);lt=t;upd(dt);draw();ui();requestAnimationFrame(loop)}spawn();requestAnimationFrame(loop);
})();</script>
</body>
</html>
