<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Morel Forager v6.7</title>
<style>body{margin:0;background:#000;color:#cfc;font-family:monospace}canvas{display:block;margin:auto;image-rendering:pixelated}#ui{position:absolute;top:8px;left:8px;background:#000c;padding:6px 10px;border:1px solid #5a5}</style>
</head>
<body>
<div id=ui>Zone <b id=z>1</b> | $<b id=m>0</b> | <span id=it>Walk to mushroom, SPACE to clear grass, E to pick</span></div>
<canvas id=c width=960 height=640></canvas>
<script>
const X=document.getElementById('c').getContext('2d'); X.imageSmoothingEnabled=false;
const L=s=>{const i=new Image();i.src=s;i.onerror=()=>console.warn('MISS',s);return i};
const BG1=L('Map_1_BG.png'), BU1=L('Map_1_Bushes.png');
const BG2=L('Map_2_BG.png'), BU2=L('Map_2_Bushes.png');
const GRASS=L('grasstuff.png');

// your exact files
const files = ['yellowmorel.png','blackmoral.png','falsemorel.png','chanterelle_1.png','chanterelle_2.png','chanterelle_3.png','bolete_king_1.png','bolete_king_2.png','shiitake_1.png','russula_green_1.png','russula_green_2.png','russula_green_3.png','russula_sickener_1.png','russula_sickener_2.png','russula_sickener_3.png','White-red_mushroom1.png','White-red_mushroom2.png','White-red_mushroom3.png'];
const MUSH = files.map(f=>({f,img:L(f),val:f.includes('falsemorel')||f.includes('sickener')||f.includes('White-red')?-3: f.includes('yellow')?5: f.includes('blackmoral')?7:4}));

let zone=1, px=480, py=320, cash=0;
let mush=[], grass=[];
const K={};

function spawn(){
  mush=[]; grass=[];
  for(let i=0;i<40;i++){
    const m=MUSH[i%MUSH.length];
    const x=130+Math.random()*700, y=150+Math.random()*360;
    const hidden = Math.random()<0.75;
    mush.push({x,y,m,hidden,got:false});
    if(hidden) grass.push({x:x-10,y:y-6,alive:true});
  }
  console.log('Spawned',mush.length,'mushrooms,',grass.length,'grass');
}
addEventListener('keydown',e=>{K[e.key.toLowerCase()]=true;
  if(e.key===' '){grass.forEach(g=>{if(g.alive && Math.hypot(g.x+10-px,g.y+6-py)<26){g.alive=false; mush.forEach(m=>{if(m.hidden && Math.hypot(m.x-px,m.y-py)<24) m.hidden=false;})}});e.preventDefault();}
  if(e.key.toLowerCase()==='e'){mush.forEach(m=>{if(!m.got && Math.hypot(m.x-px,m.y-py)<20){m.got=true;cash+=m.m.val;document.getElementById('m').textContent=cash;document.getElementById('it').textContent=m.m.f;}});}
  if(e.key==='r')spawn(); if(e.key==='1'){zone=1;spawn();} if(e.key==='2'){zone=2;spawn();}
});
addEventListener('keyup',e=>K[e.key.toLowerCase()]=false);

function loop(){
  if(K['w'])py-=2.5; if(K['s'])py+=2.5; if(K['a'])px-=2.5; if(K['d'])px+=2.5;
  px=Math.max(50,Math.min(910,px)); py=Math.max(90,Math.min(550,py));
  
  X.clearRect(0,0,960,640);
  const bg=zone===1?BG1:BG2; if(bg.complete) X.drawImage(bg,0,0,960,640); else {X.fillStyle='#223';X.fillRect(0,0,960,640);}
  
  // mushrooms
  mush.forEach(m=>{
    if(m.got) return;
    const img=m.m.img;
    if(img.complete && img.naturalWidth>0){
      if(m.hidden) X.drawImage(img,m.x-7,m.y-4,14,8); // peek
      else X.drawImage(img,m.x-8,m.y-8,16,16);
    } else {
      // FALLBACK - you will ALWAYS see this
      X.fillStyle = m.m.val<0 ? '#f44' : '#ff0';
      X.fillRect(m.x-6, m.y-(m.hidden?3:6), 12, m.hidden?6:12);
    }
  });
  
  // grass - GUARANTEED visible
  grass.forEach(g=>{
    if(!g.alive) return;
    if(GRASS.complete && GRASS.naturalWidth>0) X.drawImage(GRASS,g.x,g.y,20,18);
    else {X.fillStyle='#3a3'; X.fillRect(g.x,g.y,20,12); X.fillStyle='#2f2'; X.fillRect(g.x+4,g.y-4,12,8);}
  });
  
  const bu=zone===1?BU1:BU2; if(bu.complete) X.drawImage(bu,0,0,960,640);
  
  // PLAYER - GUARANTEED RED DOT WITH WHITE RING (no sprite confusion)
  X.fillStyle='#ff0033'; X.beginPath(); X.arc(px,py,10,0,Math.PI*2); X.fill();
  X.strokeStyle='#fff'; X.lineWidth=3; X.stroke();
  
  requestAnimationFrame(loop);
}
spawn(); loop();
</script>
</body></html>
