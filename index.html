<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Morel Forager v5.7</title>
<style>
body{margin:0;background:#0a0f0a;color:#d7f0d7;font-family:system-ui;overflow:hidden}
#ui{position:absolute;top:8px;left:8px;background:#000c;padding:8px 12px;border-radius:8px;font-size:14px;z-index:10}
#ui span{margin-right:14px}
#log{position:absolute;bottom:8px;left:8px;right:8px;height:80px;background:#000b;overflow:auto;padding:6px;font-size:12px;border-radius:6px;font-family:monospace}
canvas{display:block;margin:0 auto;background:#000;image-rendering:pixelated}
</style>
</head>
<body>
<div id="ui">
  <span>Zone: <b id="zone">1</b></span>
  <span>Cash: $<b id="cash">0</b></span>
  <span>Bag: <b id="bag">0</b>/20</span>
  <span>MP: <b id="mp">100</b></span>
</div>
<canvas id="game" width="800" height="600"></canvas>
<div id="log"></div>

<script>
// ----- CORE STATE -----
let cash = 0;
let bag = 0;
let bagMax = 20;
let mp = 100;
let currentZone = 0;
let playerX = 36; // YOUR START - Map 6→1 return
let playerY = 560;
let facing = 1;
let lastDirection = 'down';
let trespassing = false;
let lastTeleportTime = 0;

const gear = { waders: false, swampBoots: false, hikingBoots: false };
let walkSprite, walkSprite2, pokeSprite, currentSprite;
let yellowMorel, blackMorel, falseMorel;

// ----- YOUR TUNED TELEPORTS -----
const teleports = [
  { from:0, x:790, y:514, to:1, nx:47, ny:521, r:30 }, // 1→2
  { from:1, x:10, y:514, to:0, nx:744, ny:528, r:30 }, // 2→1
  { from:1, x:790, y:55, to:2, nx:69, ny:70, r:30 }, // 2→3
  { from:2, x:35, y:61, to:1, nx:754, ny:68, r:30 }, // 3→2
  { from:2, x:680, y:590, to:3, nx:685, ny:64, r:30 }, // 3→4
  { from:3, x:680, y:10, to:2, nx:711, ny:568, r:30 }, // 4→3
  { from:3, x:10, y:545, to:4, nx:749, ny:557, r:28 }, // 4→5
  { from:4, x:790, y:545, to:3, nx:50, ny:553, r:28 }, // 5→4
  { from:4, x:10, y:104, to:5, nx:749, ny:111, r:28 }, // 5→6
  { from:5, x:790, y:102, to:4, nx:43, ny:120, r:28 }, // 6→5
  { from:5, x:10, y:540, to:0, nx:36, ny:560, r:28 } // 6→1
];

const backgrounds = [], bushes = [], water = [], swamp = [];
const morels = [[],[],[],[],[],[]];

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const logDiv = document.getElementById('log');

function log(msg){ logDiv.innerHTML += msg + '<br>'; logDiv.scrollTop = 99999; }
function $(id){ return document.getElementById(id); }

// ----- IMAGE LOADING -----
function loadImage(src){
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src + '?v=57';
  });
}

async function init(){
  [walkSprite, walkSprite2, pokeSprite, yellowMorel, blackMorel, falseMorel] = await Promise.all([
    loadImage('foragespritewalk1.png'),
    loadImage('foragespritewalk2.png'),
    loadImage('foragespritepoke1.png'),
    loadImage('yellowmorel.png'),
    loadImage('blackmorel.png'),
    loadImage('falsemorel.png')
  ]);
  currentSprite = walkSprite;

  for(let i=0;i<6;i++){
    backgrounds[i] = await loadImage(`Map_${i+1}_BG.png`);
    bushes[i] = await loadImage(`Map_${i+1}_Bushes.png`);
    water[i] = await loadImage(`Water_Puddles_${i+1}.png`);
    swamp[i] = await loadImage(`Swamp_Puddles_${i+1}.png`);
    spawnMorels(i);
  }

  updateUI();
  draw();
  log('v5.7 loaded - WASD to move, SPACE to poke');
}

// ----- GAME LOGIC -----
function spawnMorels(zone){
  morels[zone] = [];
  for(let i=0;i<12;i++){
    morels[zone].push({
      x: 80 + Math.random()*640,
      y: 80 + Math.random()*440,
      type: Math.random()<0.6? 'yellow' : Math.random()<0.85? 'black' : 'false',
      found: false
    });
  }
}

function isWater(x,y){
  const img = water[currentZone];
  if(!img ||!gear.waders) return false;
  // simple pixel check - skip if no gear
  return false; // simplified for now to prevent stuck
}

function canWalk(x,y){
  if(x < 8 || x > 792 || y < 8 || y > 592) return false;
  // Temporarily disable water collision to fix movement
  // We'll re-enable after you confirm movement works
  return true;
}

function checkTeleport(){
  const now = Date.now();
  if(now - lastTeleportTime < 800) return;

  for(const t of teleports){
    if(currentZone === t.from){
      const dist = Math.hypot(playerX - t.x, playerY - t.y);
      if(dist < t.r){
        lastTeleportTime = now;
        currentZone = t.to;
        playerX = t.nx;
        playerY = t.ny;
        $('zone').textContent = currentZone + 1;
        log(`→ Zone ${currentZone+1}`);
        spawnMorels(currentZone);
        break;
      }
    }
  }
}

function move(dx, dy){
  const newX = playerX + dx * 4;
  const newY = playerY + dy * 4;

  if(!canWalk(newX, newY)) return;

  playerX = newX;
  playerY = newY;

  if(dx < 0) facing = -1;
  if(dx > 0) facing = 1;
  if(dy < 0) lastDirection = 'up';
  if(dy > 0) lastDirection = 'down';

  currentSprite = (currentSprite === walkSprite)? walkSprite2 : walkSprite;

  if(trespassing){
    mp -= gear.hikingBoots? 0.05 : 0.1;
    if(mp < 0) mp = 0;
  }

  checkTeleport();
  updateUI();
}

function poke(){
  const oldSprite = currentSprite;
  currentSprite = pokeSprite;
  draw();
  setTimeout(()=>{ currentSprite = oldSprite; draw(); }, 150);

  morels[currentZone].forEach(m => {
    if(!m.found && Math.hypot(m.x - playerX, m.y - playerY) < 26){
      m.found = true;
      if(m.type!== 'false' && bag < bagMax){
        bag++;
        cash += (m.type === 'yellow')? 15 : 25;
        log(`Found ${m.type} morel!`);
      }
    }
  });
  updateUI();
}

function updateUI(){
  $('cash').textContent = cash;
  $('bag').textContent = bag;
  $('mp').textContent = Math.floor(mp);
  $('zone').textContent = currentZone + 1;
  draw();
}

function draw(){
  ctx.clearRect(0,0,800,600);

  // Draw background STRETCHED to fill (fixes your black bar)
  if(backgrounds[currentZone]){
    ctx.drawImage(backgrounds[currentZone], 0, 0, 800, 600);
  }

  // Draw morels
  morels[currentZone].forEach(m => {
    if(!m.found){
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(m.x-2, m.y-2, 4, 4);
    } else {
      const img = m.type==='yellow'? yellowMorel : m.type==='black'? blackMorel : falseMorel;
      if(img) ctx.drawImage(img, m.x-8, m.y-12, 16, 16);
    }
  });

  // Draw bushes on top
  if(bushes[currentZone]){
    ctx.drawImage(bushes[currentZone], 0, 0, 800, 600);
  }

  // Draw player
  ctx.save();
  ctx.translate(playerX, playerY);
  ctx.scale(facing, 1);
  ctx.globalAlpha = (lastDirection === 'up')? 0.8 : 1;
  if(currentSprite) ctx.drawImage(currentSprite, -16, -24, 32, 32);
  ctx.restore();
}

// ----- CONTROLS -----
window.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if(key === 'w') move(0, -1);
  if(key === 's') move(0, 1);
  if(key === 'a') move(-1, 0);
  if(key === 'd') move(1, 0);
  if(key === ' ') { e.preventDefault(); poke(); }
  if(key === 't') { trespassing =!trespassing; log(trespassing? 'Trespassing' : 'On trail'); }
});

init();
</script>
</body>
</html>
