<!DOCTYPE html><html><head><meta charset="utf-8"><title>Morel v4.4 LIGHT</title>
<style>body{margin:0;background:#0b0e11;color:#e8f0e8;font-family:system-ui;display:flex;justify-content:center}#w{width:860px;padding:12px}canvas{width:100%;background:#000;border:1px solid #333;border-radius:10px}.h{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0}.p{background:#151a20;padding:5px 9px;border:1px solid #24303b;border-radius:6px}button{background:#1a2330;color:#fff;border:1px solid #333;padding:7px 11px;border-radius:6px;margin:2px;cursor:pointer}#log{height:110px;overflow:auto;background:#10151b;border:1px solid #222;padding:6px;font-family:monospace;font-size:12px}</style>
</head><body><div id="w"><div class="h"><span class="p">Zone: <b id="zn">Woods</b></span><span class="p">Bag <span id="bag">0</span>/18</span><span class="p">$<span id="cash">75</span></span><span class="p">MP <span id="mp">40</span></span><span class="p" id="hide" style="display:none;background:#1a3a2a;color:#a5ffad">HIDING</span></div>
<canvas id="c" width="800" height="600"></canvas>
<div><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button><button onclick="tresp()">TRESPASS</button></div><div id="log"></div></div>
<script>
const bgs=[...Array(6)].map((_,i)=>{let im=new Image();im.src=`Map_${i+1}_BG_final.jpg`;return im;});
const bush=[...Array(6)].map((_,i)=>{let im=new Image();im.src=`Map_${i+1}_Bushes_transparent.png`;return im;});
const my=new Image(),mb=new Image(),mf=new Image();my.src='yellowmorel.png';mb.src='blackmorel.png';mf.src='falsemorel.png';
const cv=document.getElementById('c'),ctx=cv.getContext('2d');
const names=['Woods','Creek','Swamp','Bramble','Mother Lode','Ending'];
let zone=0,px=10,py=540,bag=0,cash=75,mp=40,trespass=false;
let morels=[];
function log(t){const l=document.getElementById('log');l.innerHTML='> '+t+'<br>'+l.innerHTML;}
function upd(){zn.textContent=names[zone];bag.textContent=bag;cash.textContent=cash;mp.textContent=mp.toFixed(0);hide.style.display=trespass?'inline-block':'none';}
function spawn(){morels=[];if(zone===0)morels=[{x:150,y:200,t:'y'},{x:340,y:240,t:'b'},{x:560,y:310,t:'f'}];if(zone===1)morels=[{x:180,y:220,t:'y'},{x:420,y:190,t:'b'}];if(zone===2)morels=[{x:200,y:170,t:'b'},{x:440,y:260,t:'y'}];if(zone===3)morels=[{x:220,y:140,t:'b'},{x:470,y:220,t:'f'}];if(zone===4)morels=[{x:240,y:160,t:'b'},{x:500,y:240,t:'y'}];morels.forEach(m=>m.taken=false);}
function load(z,x,y){zone=z;px=x;py=y;spawn();log('Entered '+names[z]);draw();upd();}
function draw(){ctx.fillStyle='#0a0f12';ctx.fillRect(0,0,800,600);if(bgs[zone].complete)ctx.drawImage(bgs[zone],0,0,800,600);morels.forEach(m=>{if(!m.taken){let img=m.t==='y'?my:m.t==='b'?mb:mf;if(img.complete)ctx.drawImage(img,m.x-22,m.y-27,45,54);}});ctx.fillStyle=trespass?'#29b6f6':'#ffeb3b';ctx.beginPath();ctx.arc(px,py,10,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.stroke();if(bush[zone].complete)ctx.drawImage(bush[zone],0,0,800,600);}
function near(ax,ay,bx,by,r=28){return Math.hypot(ax-bx,ay-by)<r;}
function checkTele(){if(zone===0&&near(px,py,790,514)){load(1,45,495);return true;}if(zone===1&&near(px,py,10,514)){load(0,760,490);return true;}if(zone===1&&near(px,py,790,55)){load(2,45,60);return true;}if(zone===2&&near(px,py,10,55)){load(1,760,60);return true;}if(zone===2&&near(px,py,680,590)){load(3,685,50);return true;}if(zone===3&&near(px,py,680,10)){load(2,660,560);return true;}if(zone===3&&near(px,py,10,545)){load(4,750,530);return true;}if(zone===4&&near(px,py,790,545)){load(3,40,530);return true;}if(zone===4&&near(px,py,10,104)){load(5,750,110);return true;}if(zone===5&&near(px,py,790,102)){load(4,50,110);return true;}if(zone===5&&near(px,py,10,540)){load(0,40,520);return true;}return false;}
function mv(dx,dy){px=Math.max(15,Math.min(785,px+dx*7));py=Math.max(15,Math.min(585,py+dy*7));if(trespass)mp=Math.max(0,mp-0.08);if(!checkTele()){draw();upd();}}
function poke(){let n=morels.find(m=>!m.taken&&Math.hypot(m.x-px,m.y-py)<34);if(!n){log('Nothing');return;}n.taken=true;bag=Math.min(18,bag+1);mp=Math.max(0,mp-0.4);log('Picked '+(n.t==='f'?'FALSE ':n.t==='b'?'BLACK ':'YELLOW ')+'morel');draw();upd();}
function sell(){if(bag===0){log('Bag empty');return;}let v=bag*5;cash+=v;log('Sold '+bag+' for $'+v);bag=0;upd();}
function tresp(){trespass=!trespass;log(trespass?'TRESPASS ON - hide in bushes':'Trespass off');upd();}
addEventListener('keydown',e=>{if(e.code==='ArrowLeft')mv(-1,0);if(e.code==='ArrowRight')mv(1,0);if(e.code==='ArrowUp')mv(0,-1);if(e.code==='ArrowDown')mv(0,1);if(e.code==='Space'){e.preventDefault();poke();}if(e.key==='s')sell();if(e.key==='t')tresp();});
let loaded=0;const all=[...bgs,...bush,my,mb,mf];all.forEach(im=>im.onload=()=>{if(++loaded===all.length){log('Assets loaded - v4.4 LIGHT ready');load(0,10,540);}});
</script></body></html>
