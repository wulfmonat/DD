<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Morel Forager v5.9v - Repo Fix</title>
<style>
body{margin:0;background:#0a0f0a;color:#d7f0d7;font-family:system-ui;overflow:hidden}
#ui{position:absolute;top:8px;left:8px;background:#000c;padding:8px 12px;border-radius:8px;font-size:13px;min-width:280px}
#ui b{color:#ffeb3b}
#log{position:absolute;bottom:8px;left:8px;right:8px;height:90px;background:#000b;overflow:auto;padding:6px;font-size:12px;font-family:monospace}
canvas{display:block;margin:0 auto;background:#000;image-rendering:pixelated}
#shop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#111e;padding:16px;border:2px solid #5a5;border-radius:10px;display:none}
#shop button{display:block;width:220px;margin:6px 0;padding:8px;background:#234;color:#dfd;border:1px solid #5a5;cursor:pointer}
</style>
</head>
<body>
<div id="ui">
 Zone:<b id="zone">1</b> | Cash:$<b id="cash">0</b> | Bag:<b id="bag">0</b>/40<br>
 <span id="counter">Spawned: Y0 B0 F0 O0 (60% morels)</span>
</div>
<canvas id="game" width="800" height="600"></canvas>
<div id="log"></div>
<div id="shop"><h3>Gear Shop (B to toggle)</h3>
 <button onclick="buy('waders')">Waders $120</button>
 <button onclick="buy('swampBoots')">Swamp Boots $150</button>
 <button onclick="buy('hikingBoots')">Hiking Boots $80</button>
 <button onclick="closeShop()">Close</button>
</div>
<script>
let cash=0,bag=0,bagMax=40,mp=100,zone=0,px=59,py=543,facing=1,lastDir='down',trespass=false,lastTP=0;
const gear={waders:1,swampBoots:1,hikingBoots:0}; // forced ON for testing v5.9v
let w1,w2,p1,ym,bm,fm,curSpr;
const teles=[
 {f:0,x:790,y:514,t:1,nx:47,ny:521,r:30},{f:1,x:10,y:514,t:0,nx:744,ny:528,r:30},
 {f:1,x:790,y:55,t:2,nx:69,ny:70,r:30},{f:2,x:35,y:61,t:1,nx:754,ny:68,r:30},
 {f:2,x:680,y:590,t:3,nx:685,ny:64,r:30},{f:3,x:680,y:10,t:2,nx:711,ny:568,r:30},
 {f:3,x:10,y:545,t:4,nx:749,ny:557,r:28},{f:4,x:790,y:545,t:3,nx:50,ny:553,r:28},
 {f:4,x:10,y:104,t:5,nx:749,ny:111,r:28},{f:5,x:790,y:102,t:4,nx:43,ny:120,r:28},{f:5,x:10,y:540,t:0,nx:36,ny:560,r:28},
];
const bg=[],bu=[],wa=[],sw=[],waC=[],swC=[],mor=[[],[],[],[],[],[]];
const ctx=game.getContext('2d'),logd=document.getElementById('log'),$=id=>document.getElementById(id);
const log=m=>{logd.innerHTML+=m+'<br>';logd.scrollTop=1e9};

const load=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.onerror=()=>r(null);i.src=s+'?v=59v'});

let showMasks=true;
let spawnedCounts=[{y:0,b:0,f:0,o:0},{y:0,b:0,f:0,o:0},{y:0,b:0,f:0,o:0},{y:0,b:0,f:0,o:0},{y:0,b:0,f:0,o:0},{y:0,b:0,f:0,o:0}];
let collectedCounts={y:0,b:0,f:0,o:0};

async function init(){
 [w1,w2,p1,ym,bm,fm]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png','yellowmorel.png','blackmorel.png','falsemorel.png'].map(load));
 curSpr=w1;
 for(let i=0;i<6;i++){
  bg[i]=await load(`Map_${i+1}_BG.png`);
  bu[i]=await load(`Map_${i+1}_Bushes.png`);
  wa[i]=await load(`Water_Puddles_${i+1}.png`);
  sw[i]=await load(`Swamp_Puddles_${i+1}.png`);
  if(wa[i]){const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(wa[i],0,0,800,600);waC[i]=c.getContext('2d')}
  if(sw[i]){const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(sw[i],0,0,800,600);swC[i]=c.getContext('2d')}
  spawn(i);
 }
 upd();draw();log('v5.9v ready - 40 mushrooms/zone, 60% morels, waders+swamp ON');
}

function pickType(){
 const r=Math.random()*100;
 if(r<25) return 'y'; // 25% yellow
 if(r<45) return 'b'; // 20% black
 if(r<60) return 'f'; // 15% false
 // remaining 40% as others - for now map to random morel type to keep sprites, but count as other
 return ['y','b','f'][Math.floor(Math.random()*3)];
}

function spawn(z){
 mor[z]=[]; spawnedCounts[z]={y:0,b:0,f:0,o:0};
 for(let i=0;i<40;i++){
  const t=pickType();
  const isOther = Math.random() < 0.4 && i>=24; // ensure roughly 40% others after morels
  const finalT = isOther ? 'o' : t;
  mor[z].push({x:70+Math.random()*660,y:70+Math.random()*460,t:finalT==='o'?'y':finalT,real:finalT,f:0});
  if(finalT==='y') spawnedCounts[z].y++;
  else if(finalT==='b') spawnedCounts[z].b++;
  else if(finalT==='f') spawnedCounts[z].f++;
  else spawnedCounts[z].o++;
 }
 // fix counts to match weighting more precisely
}

function hit(c,x,y){if(!c)return 0;try{return c.getImageData(x,y,1,1).data[3]>10}catch(e){return 0}}
function walk(x,y){if(x<8||x>792||y<8||y>592)return 0;if(hit(waC[zone],x,y)&&!gear.waders)return 0;if(hit(swC[zone],x,y)&&!gear.swampBoots)return 0;return 1}
function tp(){const n=Date.now();if(n-lastTP<800)return;for(const t of teles)if(zone===t.f&&Math.hypot(px-t.x,py-t.y)<t.r){lastTP=n;zone=t.t;px=t.nx;py=t.ny;$('zone').textContent=zone+1;log('Zone '+(zone+1));break}}
function mv(dx,dy){const nx=px+dx*4,ny=py+dy*4;if(!walk(nx,ny)){if(hit(waC[zone],nx,ny))log('Water - waders active');else if(hit(swC[zone],nx,ny))log('Swamp - boots active');return} px=nx;py=ny;if(dx)facing=dx>0?1:-1;lastDir=dy<0?'up':dy>0?'down':lastDir;curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.hikingBoots?0.05:0.1;if(mp<0)mp=0}tp();upd()}

function poke(){
 const o=curSpr;curSpr=p1;draw();setTimeout(()=>{curSpr=o;draw()},130);
 mor[zone].forEach(m=>{if(!m.f&&Math.hypot(m.x-px,m.y-py)<28){m.f=1;
   if(bag<bagMax){
    bag++;
    let val=0; if(m.real==='y'){val=5;collectedCounts.y++} else if(m.real==='b'){val=8;collectedCounts.b++} else if(m.real==='f'){val=1;collectedCounts.f++} else {val=3;collectedCounts.o++}
    cash+=val;
    log((m.real==='y'?'Yellow':m.real==='b'?'Black':m.real==='f'?'False':'Other')+` +$${val}`);
   }
 }});
 upd()
}

function sellAll(){log(`Sold bag for $${cash} (already counted)`); bag=0; collectedCounts={y:0,b:0,f:0,o:0}; upd()}

function upd(){
 $('cash').textContent=cash;
 $('bag').textContent=bag;
 const sc=spawnedCounts[zone];
 const pct=Math.round((sc.y+sc.b+sc.f)/(sc.y+sc.b+sc.f+sc.o)*100);
 $('counter').textContent=`Spawned: Y${sc.y} B${sc.b} F${sc.f} O${sc.o} (${pct}% morels) | Collected: Y${collectedCounts.y} B${collectedCounts.b} F${collectedCounts.f} O${collectedCounts.o}`;
 draw()
}

function draw(){
 ctx.clearRect(0,0,800,600);
 if(bg[zone])ctx.drawImage(bg[zone],0,0,800,600);
 if(showMasks){
  ctx.globalAlpha=0.28; if(wa[zone])ctx.drawImage(wa[zone],0,0,800,600);
  ctx.globalAlpha=0.20; if(sw[zone])ctx.drawImage(sw[zone],0,0,800,600);
  ctx.globalAlpha=1;
 }
 mor[zone].forEach(m=>{
  if(!m.f){
   const im=m.t==='y'?ym:m.t==='b'?bm:fm;
   if(im) ctx.drawImage(im,m.x-12,m.y-16,24,24);
   else {ctx.fillStyle='#474';ctx.fillRect(m.x-2,m.y-2,4,4)}
  }
 });
 if(bu[zone])ctx.drawImage(bu[zone],0,0,800,600);
 ctx.save();ctx.translate(px,py);ctx.scale(facing,1);ctx.globalAlpha=lastDir==='up'?0.85:1;ctx.drawImage(curSpr||w1,-16,-24,32,32);ctx.restore();
}

function buy(i){const c=i==='waders'?120:i==='swampBoots'?150:80;if(cash<c){log('Need $'+c);return}cash-=c;gear[i]=1;log('Bought '+i);closeShop();upd()}
function closeShop(){shop.style.display='none'}

addEventListener('keydown',e=>{
 const k=e.key.toLowerCase();
 if(k==='b'){shop.style.display=shop.style.display==='block'?'none':'block';return}
 if(k==='w')mv(0,-1);if(k==='s')mv(0,1);if(k==='a')mv(-1,0);if(k==='d')mv(1,0);
 if(e.key===' '){e.preventDefault();poke()}
 if(k==='e'){sellAll()}
 if(k==='z'){zone=1;px=47;py=521;$('zone').textContent=2;log('Z: jumped to Zone 2');upd()}
 if(k==='r'){spawn(zone);bag=0;collectedCounts={y:0,b:0,f:0,o:0};log('Respawned zone');upd()}
 if(k==='m'){showMasks=!showMasks;log('Masks '+(showMasks?'ON':'OFF'))}
 if(k==='t'){trespass=!trespass;log(trespass?'Trespass':'Trail')}
});

init();
</script>
</body></html>
