<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Morel Forager v5.6</title>
<style>
body{margin:0;background:#0a0f0a;color:#d7f0d7;font-family:system-ui;overflow:hidden}
#ui{position:absolute;top:8px;left:8px;background:#000a;padding:8px 10px;border-radius:8px;font-size:14px;z-index:10}
#ui span{margin-right:12px}
#log{position:absolute;bottom:8px;left:8px;right:8px;height:80px;background:#000a;overflow:auto;padding:6px;font-size:12px;border-radius:6px}
#shop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#111e;padding:16px;border:2px solid #5a5;border-radius:10px;display:none;z-index:20}
#shop button{display:block;width:220px;margin:6px 0;padding:8px;background:#234;color:#dfd;border:1px solid #5a5;cursor:pointer}
canvas{display:block;margin:0 auto;background:#000}
.pill{padding:2px 6px;border-radius:4px;background:#234}
.hide{background:#3a3}
</style>
</head>
<body>
<div id="ui">
  <span>Zone: <b id="zone">1</b></span>
  <span>Cash: $<b id="cash">0</b></span>
  <span>Bag: <b id="bag">0</b>/20</span>
  <span>MP: <b id="mp">100</b></span>
  <span id="hide" class="pill hide" style="display:none">HIDING</span>
  <span style="opacity:.7">[WASD] [SPACE] poke [T] trespass [B] shop</span>
</div>
<canvas id="c" width="800" height="600"></canvas>
<div id="log"></div>
<div id="shop">
  <h3 style="margin-top:0">Gear Shop</h3>
  <button onclick="buy('waders',120)">Waders $120</button>
  <button onclick="buy('swamp',150)">Swamp Boots $150</button>
  <button onclick="buy('boots',80)">Hiking Boots $80</button>
  <button onclick="buy('bag',200)">Big Bag +10 $200</button>
  <button onclick="toggleShop(false)" style="background:#422">Close</button>
</div>
<script>
const $=id=>document.getElementById(id);
const ctx=c.getContext('2d');
const log=m=>{logd.innerHTML+=m+'<br>';logd.scrollTop=1e9}; const logd=$('log');

let cash=0,bag=0,bagMax=20,mp=100,cur=0,px=400,py=300,facing=1,lastDir='down';
let trespass=false,curSpr,lastTele=0;
const gear={boots:false,waders:false,swamp:false};

// YOUR TUNED TELEPORTS - v5.6
const teleports=[
 {from:0,x:790,y:514,to:1,nx:47,ny:521,r:32}, // 1→2
 {from:1,x:10,y:514,to:0,nx:744,ny:528,r:32}, // 2→1
 {from:1,x:790,y:55,to:2,nx:69,ny:70,r:32}, // 2→3
 {from:2,x:35,y:61,to:1,nx:754,ny:68,r:32}, // 3→2
 {from:2,x:680,y:590,to:3,nx:685,ny:64,r:32}, // 3→4
 {from:3,x:680,y:10,to:2,nx:711,ny:568,r:32}, // 4→3
 {from:3,x:10,y:545,to:4,nx:749,ny:557,r:28}, // 4→5
 {from:4,x:790,y:545,to:3,nx:50,ny:553,r:28}, // 5→4
 {from:4,x:10,y:104,to:5,nx:749,ny:111,r:28}, // 5→6
 {from:5,x:790,y:102,to:4,nx:43,ny:120,r:28}, // 6→5
 {from:5,x:10,y:540,to:0,nx:36,ny:560,r:28}, // 6→1
];

const bg=[],bush=[],water=[],swamp=[],morels=[[],[],[],[],[],[]];
const load=src=>new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>res(null);i.src=src+'?v=56'});
const spr=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=s+'?v=56'});

function a(c,x,y){if(!c)return false;if(!c._c)c._c=c.getContext('2d',{willReadFrequently:true});try{return c._c.getImageData(x,y,1,1).data[3]>10}catch(e){return false}}

async function init(){
 const [w1,w2,p1,ym,bm,fm]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png','yellowmorel.png','blackmorel.png','falsemorel.png'].map(spr));
 curSpr=w1; window.w1=w1;window.w2=w2;window.p1=p1;window.ym=ym;window.bm=bm;window.fm=fm;
 for(let i=0;i<6;i++){
   bg[i]=await load(`Map_${i+1}_BG.png`);
   bush[i]=await load(`Map_${i+1}_Bushes.png`);
   water[i]=await load(`Water_Puddles_${i+1}.png`);
   swamp[i]=await load(`Swamp_Puddles_${i+1}.png`);
   spawn(i);
 }
 upd();draw();log('v5.6 ready - all teleports tuned');
}

function spawn(z){morels[z]=[];const n=14;for(let i=0;i<n;i++)morels[z].push({x:90+Math.random()*620,y:90+Math.random()*420,type:Math.random()<.6?'yellow':Math.random()<.85?'black':'false',revealed:false})}
function canWalk(x,y){if(x<5||x>795||y<5||y>595)return false;if(water[cur]&&a(water[cur],x,y))return gear.waders;if(swamp[cur]&&a(swamp[cur],x,y))return gear.swamp;return true}
function checkTele(){const n=Date.now();if(n-lastTele<800)return;for(const t of teleports){if(cur===t.from&&Math.hypot(px-t.x,py-t.y)<t.r){lastTele=n;cur=t.to;px=t.nx;py=t.ny;spawn(cur);$('zone').textContent=cur+1;log('Entered Zone '+(cur+1));break}}}
function mv(dx,dy){const nx=px+dx*3.2,ny=py+dy*3.2;if(!canWalk(nx,ny))return;px=nx;py=ny;if(dx<0)facing=-1;if(dx>0)facing=1;if(dy<0)lastDir='up';if(dy>0)lastDir='down';curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.boots?0.04:0.08;if(mp<=0){mp=0;trespass=false;log('Too tired')}}checkTele();upd()}
function upd(){$('cash').textContent=cash;$('bag').textContent=bag;$('mp').textContent=Math.floor(mp);$('hide').style.display=(trespass&&bush[cur]&&a(bush[cur],px,py))?'inline-block':'none';draw()}
function draw(){ctx.clearRect(0,0,800,600);if(bg[cur])ctx.drawImage(bg[cur],0,0,800,600);if(water[cur]&&gear.waders){ctx.globalAlpha=.25;ctx.drawImage(water[cur],0,0,800,600);ctx.globalAlpha=1}if(swamp[cur]&&gear.swamp){ctx.globalAlpha=.25;ctx.drawImage(swamp[cur],0,0,800,600);ctx.globalAlpha=1}morels[cur].forEach(m=>{if(!m.revealed){ctx.fillStyle='#1a2f1a';ctx.fillRect(m.x-2,m.y-2,4,4)}else{const img=m.type==='yellow'?ym:m.type==='black'?bm:fm;if(img)ctx.drawImage(img,m.x-8,m.y-12,16,16)}});if(bush[cur])ctx.drawImage(bush[cur],0,0,800,600);ctx.save();ctx.translate(px,py);ctx.scale(facing,1);if(curSpr){ctx.globalAlpha=lastDir==='up'?0.75:1;ctx.drawImage(curSpr,-16,-24,32,32)}ctx.restore()}
function poke(){const o=curSpr;curSpr=p1;draw();setTimeout(()=>{curSpr=o;draw()},120);morels[cur].forEach(m=>{if(!m.revealed&&Math.hypot(m.x-px,m.y-py)<24){m.revealed=true;if(m.type!=='false'&&bag<bagMax){bag++;cash+=m.type==='yellow'?15:25;log('Picked '+m.type)}}});upd()}
function toggleShop(o){$('shop').style.display=o?'block':'none'}
function buy(it,c){if(cash<c){log('Need $'+c);return}cash-=c;if(it==='bag')bagMax+=10;else gear[it]=true;log('Bought '+it);toggleShop(false);upd()}

addEventListener('keydown',e=>{
 if(e.key==='b'||e.key==='B'){toggleShop($('shop').style.display==='none');return}
 if(e.key==='t'||e.key==='T'){trespass=!trespass;if(trespass&&mp<5){trespass=false;log('Too tired')}else log(trespass?'Trespassing':'Left');return}
 if(e.key===' '){e.preventDefault();poke();return}
 const k={w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]}[e.key.toLowerCase()];if(k)mv(k[0],k[1]);
});
init();
</script></body></html>
