<!DOCTYPE html><html><head><meta charset=utf-8><title>Debug v6.5</title>
<style>body{margin:0;background:#111;color:#eee;font-family:monospace}canvas{display:block;margin:auto}</style></head><body>
<canvas id=c width=960 height=640></canvas>
<script>
const SPR={};
const ctx=c.getContext('2d');const I={};for(const k in SPR){I[k]=new Image();I[k].src=SPR[k];console.log('loading',k)}
const bg=new Image();bg.src='Map_1_BG.png';
let px=480,py=320;
const mush=[];const grass=[];
function spawn(){mush.length=0;grass.length=0;for(let i=0;i<20;i++){const x=150+Math.random()*660;const y=150+Math.random()*340;mush.push({x,y});grass.push({x:x-14,y:y-14});}console.log('spawned',mush.length)}
function draw(){ctx.clearRect(0,0,960,640);if(bg.complete)ctx.drawImage(bg,0,0,960,640);else{ctx.fillStyle='#334';ctx.fillRect(0,0,960,640);}
// draw debug mushrooms as YELLOW squares if image fails
mush.forEach(m=>{const img=I.yellowmorel_24;if(img&&img.complete&&img.naturalWidth>0){ctx.drawImage(img,m.x-12,m.y-12,24,24);}else{ctx.fillStyle='#ff0';ctx.fillRect(m.x-8,m.y-8,16,16);}});
// draw grass debug
grass.forEach(g=>{const img=I.grass1;if(img&&img.complete)ctx.drawImage(img,g.x,g.y,28,28);else{ctx.fillStyle='#0a0';ctx.fillRect(g.x,g.y,28,28);}});
ctx.fillStyle='red';ctx.beginPath();ctx.arc(px,py,12,0,7);ctx.fill();
ctx.fillStyle='white';ctx.fillText('M:'+mush.length,10,20);
}
addEventListener('keydown',e=>{if(e.key==='w')py-=8;if(e.key==='s')py+=8;if(e.key==='a')px-=8;if(e.key==='d')px+=8;if(e.key==='r')spawn();});
spawn();setInterval(draw,100);
</script></body></html>
