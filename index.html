<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Morel Forager v5.5d TUNER</title>
<style>
html,body{margin:0;height:100%;background:#000;color:#d7f0d7;font-family:system-ui;overflow:hidden}
#bar{display:flex;justify-content:space-between;padding:6px 10px;background:#111;font-size:13px}
#wrap{height:calc(100vh - 90px);display:flex;align-items:center;justify-content:center;background:#000}
canvas{width:800px;height:600px;image-rendering:pixelated;background:#000}
#log{height:70px;background:#0a0a0a;overflow:auto;padding:5px 8px;font-size:11px;font-family:monospace;border-top:1px solid #222}
</style></head><body>
<div id="bar"><div>Zone:<b id="z">1</b> | WASD move | `=rings | C=copy | Shift+S=save landing</div><div id="hud">X:400 Y:300</div></div>
<div id="wrap"><canvas id="cv" width="800" height="600"></canvas></div>
<div id="log"></div>
<script>
const $=id=>document.getElementById(id), ctx=cv.getContext('2d');
const log=m=>{logd.innerHTML+=m+'<br>';logd.scrollTop=1e9}; const logd=$('log'), hud=$('hud');
let cur=0,px=400,py=300,lastTele=0,show=false; window.lastUsed=null;

const teles=[
 {from:0,x:790,y:514,to:1,nx:39,ny:517,r:32},
 {from:1,x:10,y:514,to:0,nx:764,ny:524,r:32},
 {from:1,x:790,y:55,to:2,nx:45,ny:110,r:32},
 {from:2,x:35,y:61,to:1,nx:770,ny:120,r:32},
 {from:2,x:680,y:590,to:3,nx:685,ny:120,r:32},
 {from:3,x:680,y:10,to:2,nx:683,ny:500,r:32},
 {from:3,x:10,y:545,to:4,nx:765,ny:541,r:28},
 {from:4,x:790,y:545,to:3,nx:26,ny:545,r:28},
 {from:4,x:10,y:104,to:5,nx:769,ny:99,r:28},
 {from:5,x:790,y:102,to:4,nx:35,ny:104,r:28},
 {from:5,x:10,y:540,to:0,nx:32,ny:544,r:28},
];

const bg=[], spr=new Image(); spr.src='foragespritewalk1.png';
const load=s=>new Promise(r=>{const i=new Image();i.onload=()=>r(i);i.src=s+'?v=55d'});
(async()=>{for(let i=0;i<6;i++)bg[i]=await load(`Map_${i+1}_BG.png`);draw();log('TUNER loaded - maps stretched to fill - no black bar')})();

function check(){const n=Date.now();if(n-lastTele<800)return;for(const t of teles){if(cur===t.from&&Math.hypot(px-t.x,py-t.y)<t.r){lastTele=n;window.lastUsed=t;cur=t.to;px=t.nx;py=t.ny;$('z').textContent=cur+1;log(`HIT ${t.from+1}→${t.to+1}`);break}}}
function draw(){ctx.clearRect(0,0,800,600);
// FORCE STRETCH TO FILL - this removes the bar
if(bg[cur])ctx.drawImage(bg[cur],0,0,800,600);
if(spr.complete)ctx.drawImage(spr,px-16,py-24,32,32);
if(show){ctx.strokeStyle='#ff0';ctx.lineWidth=2;teles.filter(t=>t.from===cur).forEach(t=>{ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,7);ctx.stroke()})}
hud.textContent=`X:${Math.round(px)} Y:${Math.round(py)}`}

function mv(dx,dy){px=Math.max(5,Math.min(795,px+dx*4));py=Math.max(5,Math.min(595,py+dy*4));check();draw()}

addEventListener('keydown',e=>{
 const k={w:[0,-1],s:[0,1],a:[-1,0],d:[1,0]}[e.key.toLowerCase()];if(k)mv(k[0],k[1]);
 if(e.key==='`'){show=!show;draw()}
 if(e.key.toLowerCase()==='c'){navigator.clipboard.writeText(`${Math.round(px)},${Math.round(py)}`);log('COPY '+px+','+py)}
 if(e.shiftKey&&e.key==='S'){if(!window.lastUsed)return;window.lastUsed.nx=Math.round(px);window.lastUsed.ny=Math.round(py);const o=`${window.lastUsed.from+1}→${window.lastUsed.to+1} nx:${window.lastUsed.nx} ny:${window.lastUsed.ny}`;navigator.clipboard.writeText(o);log('SAVED '+o)}
});
draw();
</script></body></html>
