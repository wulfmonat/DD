<!DOCTYPE html><html><head><meta charset="utf-8"><title>Morel Hunter v5.2a</title><style>body{margin:0;background:#0b0b0e;color:#ddd;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:10px;padding:7px 10px;margin:6px;background:#14141b;border:1px solid #222;border-radius:8px;flex-wrap:wrap}#hud b{color:#fff}.pill{padding:2px 6px;border-radius:99px;font-size:11px;display:none}#hide{background:#1e2a1e;color:#9fe29f}#alert{background:#3a1e1e;color:#ff8080}#game{width:1100px;height:825px;max-width:96vw;max-height:70vh;background:#000;border:1px solid #222;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:5px;flex-wrap:wrap}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:7px 10px;border-radius:7px;cursor:pointer;font:inherit}button:hover{background:#222235}#log{width:1100px;max-width:96vw;height:100px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">0</b> Day:<b id="day">1</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Bag:<b id="bag">0/18</b> Scent:<b id="scent">0</b> <span id="hide" class="pill">HIDING</span> <span id="alert" class="pill">SPOTTED</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE [Space]</button><button onclick="sell()">SELL</button><button onclick="toggleTrespass()">TRESPASS</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxBag=18,facing=1,lastDir='down',pickAnim=0,day=1,trespass=false,scentTrail=[];
const bg=[],bush=[],water=[],swamp=[],morels=[[],[],[],[],[],[]];
const gear={boots:false,waders:true,swamp:true};
let guards=[],dogs=[];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=i=>document.getElementById(i),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};

async function load(n){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+n})}
async function spr(n){const i=new Image();i.crossOrigin='anonymous';i.src=BASE+n;return new Promise(r=>{i.onload=()=>{const c=document.createElement('canvas');c.width=64;c.height=64;c.getContext('2d').drawImage(i,0,0,64,64);r(c)};i.onerror=()=>r(document.createElement('canvas'))})}
const [w1,w2,p1]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png'].map(spr));let curSpr=w1;

for(let i=0;i<6;i++){
  bg[i]=await load(`Map_${i+1}_BG.png`);
  bush[i]=await load(`Map_${i+1}_Bushes.png`);
  water[i]=await load(`Water_Puddles_${i+1}.png`);
  swamp[i]=await load(`Swamp_Puddles_${i+1}.png`);
}
function a(c,x,y){return c?c.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}
function upd(){$('zone').textContent=cur;$('day').textContent=day;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('bag').textContent=bag.length+'/'+maxBag;$('scent').textContent=scentTrail.length;$('hide').style.display=(trespass&&a(bush[cur],px,py))?'inline-block':'none';$('alert').style.display=guards.some(g=>inCone(g))?'inline-block':'none'}
function spawn(z){if(morels[z].length)return;for(let i=0;i<18;i++){let t=0;while(t++<400){const x=30+Math.random()*740,y=30+Math.random()*540;if(a(bush[z],x,y)){morels[z].push({x,y,type:Math.random()<.65?'yellow':'black',revealed:false});break}}}}
function inCone(g){const dx=px-g.x,dy=py-g.y,d=Math.hypot(dx,dy);if(d>85||a(bush[cur],px,py))return false;const ang=Math.atan2(dy,dx);let da=Math.abs(((ang-g.ang+Math.PI*3)%(2*Math.PI))-Math.PI);return da<1.05}
function guardStep(g){g.x+=g.vx;g.y+=g.vy;if(g.x<40||g.x>760)g.vx*=-1;if(g.y<40||g.y>560)g.vy*=-1;g.ang=Math.atan2(g.vy,g.vx)}
function dogStep(d){if(!scentTrail.length)return;const t=scentTrail[0];const dx=t.x-d.x,dy=t.y-d.y,dist=Math.hypot(dx,dy);if(dist>2){d.x+=dx/dist*2.2;d.y+=dy/dist*2.2}}

window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*4)),ny=Math.max(0,Math.min(599,py+dy*4));const p=bg[cur].getContext('2d').getImageData(nx,ny,1,1).data;const ok=p[0]>=170||a(bush[cur],nx,ny)||(water[cur]&&a(water[cur],nx,ny)&&gear.waders)||(swamp[cur]&&a(swamp[cur],nx,ny)&&gear.swamp);if(!ok)return;px=nx;py=ny;if(dx<0)facing=-1;if(dx>0)facing=1;if(dy<0)lastDir='up';if(dy>0)lastDir='down';curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.boots?0.04:0.08;scentTrail.push({x:px,y:py,t:Date.now()});if(scentTrail.length>300)scentTrail.shift();if(mp<=0)endTrespass('exhausted')}upd()}
window.poke=()=>{curSpr=p1;setTimeout(()=>curSpr=w1,150);const m=morels[cur].find(o=>!o.revealed&&Math.hypot(px-o.x,py-o.y)<22);if(m){m.revealed=true;mp-=1;log('Peek '+m.type);upd();return}const n=morels[cur].find(o=>o.revealed&&Math.hypot(px-o.x,py-o.y)<22);if(n){morels[cur]=morels[cur].filter(x=>x!==n);if(bag.length<maxBag){bag.push(n.type);mp-=gear.boots?0.5:1;pickAnim=14;log('Picked '+n.type+(trespass?' *HOT*':''))}}upd()}
window.sell=()=>{const v=bag.reduce((s,t)=>s+(t==='yellow'?8:12)*(trespass?2:1),0);cash+=v;bag=[];log('Sold $'+v);upd()}
window.toggleTrespass=()=>{if(trespass){endTrespass('left');return}if(cur===0){log('Woods is SAFE ZONE');return}trespass=true;mp=100;scentTrail=[];guards=[];dogs=[];for(let i=0;i<2;i++)guards.push({x:120+Math.random()*560,y:80+Math.random()*400,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,ang:0});for(let i=0;i<2;i++)dogs.push({x:380+Math.random()*40,y:280+Math.random()*40});log('TRESPASS ON - hide in bushes!');upd()}
function endTrespass(r){if(!trespass)return;trespass=false;if(r==='bust'){const fine=30+Math.floor(Math.random()*41);cash=Math.max(0,cash-fine);bag=[];log('BUSTED! -$'+fine)}else log('Exited');day++;guards=[];dogs=[];scentTrail=[];cur=0;px=10;py=540;spawn(0);upd()}

spawn(0);upd();
setInterval(()=>{if(mp<100&&!trespass){mp=Math.min(100,mp+(gear.boots?0.4:0.25));upd()}},1000);
function draw(){ctx.clearRect(0,0,800,600);if(bg[cur])ctx.drawImage(bg[cur],0,0);
 if(water[cur]&&gear.waders){ctx.globalAlpha=.32;ctx.drawImage(water[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#6ecfff';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(swamp[cur]&&gear.swamp){ctx.globalAlpha=.32;ctx.drawImage(swamp[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#7CFF7C';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(bush[cur])ctx.drawImage(bush[cur],0,0);
 morels[cur].forEach(m=>{ctx.fillStyle=m.revealed?(m.type==='yellow'?'#ffd54f':'#5d4037'):'#1a2a1a';if(m.revealed){ctx.beginPath();ctx.arc(m.x,m.y,6,0,7);ctx.fill()}else{ctx.fillRect(m.x-4,m.y-4,8,8)}});
 if(trespass){scentTrail=scentTrail.filter(s=>Date.now()-s.t<(gear.boots?3000:5000));ctx.strokeStyle='rgba(200,170,100,0.18)';scentTrail.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,2.5,0,7);ctx.stroke()});guards.forEach(g=>{guardStep(g);ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.ang);ctx.fillStyle='rgba(255,230,100,0.14)';ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,85,-1.05,1.05);ctx.fill();ctx.restore();ctx.fillStyle='#e53935';ctx.beginPath();ctx.arc(g.x,g.y,7,0,7);ctx.fill();if(inCone(g))endTrespass('bust')});dogs.forEach(d=>{dogStep(d);ctx.fillStyle='#5d4037';ctx.beginPath();ctx.arc(d.x,d.y,7,0,7);ctx.fill();ctx.fillStyle='#3e2723';ctx.beginPath();ctx.arc(d.x+2,d.y-2,2,0,7);ctx.fill();if(Math.hypot(px-d.x,py-d.y)<15&&!a(bush[cur],px,py))endTrespass('bust')})}
 ctx.save();ctx.translate(px,py-pickAnim/3.5);ctx.scale(facing,1);if(lastDir==='up')ctx.filter='brightness(0.72)';else if(lastDir==='down')ctx.filter='brightness(1.15) saturate(1.05)';ctx.drawImage(curSpr,-24,-24,48,48);ctx.restore();if(pickAnim>0){pickAnim--;ctx.globalAlpha=pickAnim/14;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py-28,2+pickAnim/4,0,7);ctx.fill();ctx.globalAlpha=1}
 requestAnimationFrame(draw)}draw();log('v5.2a loaded - all 6 maps, trespass ready');
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);if(e.key==='ArrowRight')mv(1,0);if(e.key==='ArrowUp')mv(0,-1);if(e.key==='ArrowDown')mv(0,1);if(e.code==='Space'){e.preventDefault();poke()}});
})();</script></body></html>
