<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morel Hunter v4.9</title><style>body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:14px;padding:8px 12px;margin:10px;background:#14141b;border:1px solid #23232e;border-radius:8px}#hud b{color:#fff;margin-left:4px}.pill{display:none;padding:2px 8px;background:#1e2a1e;border:1px solid #2f4630;border-radius:999px;color:#9fe29f;font-size:11px}#game{width:1100px;height:825px;max-width:95vw;max-height:70vh;background:#000;border:1px solid #222;border-radius:8px;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:6px;flex-wrap:wrap;justify-content:center}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:7px 10px;border-radius:7px;font:inherit;cursor:pointer}button:hover{background:#20202c}#log{width:1100px;max-width:95vw;height:110px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;border-radius:8px;padding:6px 8px;font-size:12px;color:#a9a9b3;white-space:pre-line}</style></head><body>
<div id="hud"><span>Zone:<b id="zone">0</b></span><span>Bag <b id="bag">0/18</b></span><span>$<b id="cash">75</b></span><span>MP <b id="mp">100</b></span><span>Inv:<b id="inv">-</b></span><span id="hide" class="pill">HIDING</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE [Space]</button><button onclick="sell()">SELL</button><button onclick="trespass()">TRESPASS (-5MP)</button></div>
<div id="controls"><button onclick="buyGear('boots')">Boots $40+2 cloth</button><button onclick="buyGear('basket')">Basket $60+3 bark</button><button onclick="buyGear('waders')">Waders $80+4 cloth</button><button onclick="buyGear('swamp')">Swamp $70+3 bark+2 stone</button><button onclick="rest()">Rest -$5</button><button onclick="useHerb()">Use Herb +20MP</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18,facing=1,lastDir='down',walk=false;
const bgCan=[],bushCan=[],waterCan=[],swampCan=[],morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={stick:0,bark:0,herb:0,stone:0,cloth:0},gear={boots:false,basket:false,waders:false,swamp:false};
let clearedZones=new Set();
const teleports=[{from:0,x:790,y:514,to:1,x2:39,y2:517},{from:1,x:10,y:514,to:0,x2:764,y2:524},{from:1,x:790,y:55,to:2,x2:45,y2:54},{from:2,x:10,y:55,to:1,x2:770,y2:53},{from:2,x:680,y:590,to:3,x2:685,y2:32},{from:3,x:680,y:10,to:2,x2:683,y2:572},{from:3,x:10,y:545,to:4,x2:765,y2:541},{from:4,x:790,y:545,to:3,x2:26,y2:545},{from:4,x:10,y:104,to:5,x2:769,y2:99},{from:5,x:790,y:102,to:4,x2:35,y2:104},{from:5,x:10,y:540,to:0,x2:32,y2:544}];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=id=>document.getElementById(id),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
async function loadCan(n){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+n})}
async function loadSprite(n){return new Promise(r=>{const im=new Image();im.crossOrigin='anonymous';im.src=BASE+n;im.onload=()=>{const t=document.createElement('canvas');t.width=im.width;t.height=im.height;const g=t.getContext('2d');g.drawImage(im,0,0);const d=g.getImageData(0,0,t.width,t.height),a=d.data;let minX=t.width,minY=t.height,maxX=0,maxY=0;for(let y=0;y<t.height;y++)for(let x=0;x<t.width;x++){const i=(y*t.width+x)*4;if(a[i]>240&&a[i+1]>240&&a[i+2]>240)a[i+3]=0;if(a[i+3]>10){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y)}}const w=maxX-minX+1,h=maxY-minY+1;const o=document.createElement('canvas');o.width=64;o.height=64;const s=Math.min(45/w,45/h);o.getContext('2d').drawImage(t,minX,minY,w,h,(64-w*s)/2,(64-h*s)/2,w*s,h*s);r(o)};im.onerror=()=>r(document.createElement('canvas'))})}
const [sprW1,sprW2,sprP1,sprP2]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png','foragespritepoke2.png'].map(loadSprite));let curSprite=sprW1;
async function proc(src,size){const c=await loadCan(src);const o=document.createElement('canvas');o.width=size;o.height=size;if(c)o.getContext('2d').drawImage(c,0,0,c.width,c.height,0,0,size,size);return o}
const [imgY,imgB,imgF]=await Promise.all([proc('yellowmorel.png',32),proc('blackmorel.png',32),proc('falsemorel.png',20)]);
const grassTuft=await proc('grasstuft.png',15),grassTuftS=await proc('grasstuft_small.png',11);
for(let i=0;i<6;i++){bgCan[i]=await loadCan(`Map_${i+1}_BG.png`);bushCan[i]=await loadCan(`Map_${i+1}_Bushes.png`);waterCan[i]=await loadCan(`Water_Puddles_${i+1}.png`);swampCan[i]=await loadCan(`Swamp_Puddles_${i+1}.png`)}
function getA(c,x,y){return c&&x>=0&&y>=0&&x<800&&y<600?c.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}
function upd(){$('zone').textContent=cur;$('bag').textContent=bag.length+'/'+maxBag;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('hide').style.display=getA(bushCan[cur],px,py)?'inline-block':'none';$('inv').textContent=`S${inv.stick} B${inv.bark} H${inv.herb} St${inv.stone} C${inv.cloth}`}
function spawn(z){if(morels[z].length)return;for(let i=0;i<15+Math.floor(Math.random()*5);i++){let t=0;while(t++<400){const x=20+Math.random()*760,y=20+Math.random()*560;if(getA(bushCan[z],x,y)){const r=Math.random();morels[z].push({x,y,type:r<.5?'yellow':r<.8?'black':'false',img:r<.5?imgY:r<.8?imgB:imgF,revealed:false});break}}}forage[z]=[];for(let i=0;i<35;i++){let t=0;while(t++<300){const x=30+Math.random()*740,y=30+Math.random()*540;const p=bgCan[z].getContext('2d').getImageData(x,y,1,1).data;if(p[0]>=180&&p[0]<=230){const loot=['stick','stick','bark','bark','herb','stone','cloth'];forage[z].push({x,y,item:loot[Math.floor(Math.random()*7)],taken:false});break}}}}
function checkTP(){for(const t of teleports){if(t.from!==cur)continue;if(Math.hypot(px-t.x,py-t.y)<18){clearedZones.add(cur);cur=t.to;px=t.x2;py=t.y2;log('→ Zone '+cur);if(cur===0&&clearedZones.size>=6){for(let z=0;z<6;z++){morels[z]=[];forage[z]=[]}clearedZones.clear();log('Loop complete — world respawned');}spawn(cur);break}}}
window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*4)),ny=Math.max(0,Math.min(599,py+dy*4));const p=bgCan[cur].getContext('2d').getImageData(nx,ny,1,1).data;const tan=p[0]>=180&&p[0]<=230;const bush=getA(bushCan[cur],nx,ny);const water=getA(waterCan[cur],nx,ny);const swamp=getA(swampCan[cur],nx,ny);let ok=tan||bush;if(water&&gear.waders)ok=true;if(swamp&&gear.swamp)ok=true;if(water&&!gear.waders)ok=false;if(swamp&&!gear.swamp)ok=false;if(ok){px=nx;py=ny;if(dx<0){facing=-1;lastDir='side'}if(dx>0){facing=1;lastDir='side'}if(dy<0)lastDir='up';if(dy>0)lastDir='down';walk=!walk;curSprite=walk?sprW1:sprW2;checkTP()}upd()}
window.poke=()=>{if(mp<1){log('Too tired');return}curSprite=sprP1;setTimeout(()=>curSprite=sprP2,110);setTimeout(()=>curSprite=sprW1,220);let m=morels[cur].find(o=>!o.revealed&&Math.hypot(px-o.x,py-o.y)<20);if(m){mp-=1;m.revealed=true;log('Peeked '+m.type+' (1 MP)');upd();return}let f=forage[cur].find(o=>!o.taken&&Math.hypot(px-o.x,py-o.y)<18);if(f){mp-=1;f.taken=true;inv[f.item]++;log('Foraged '+f.item);upd();return}mp-=0.5;log('Nothing here');upd()}
window.sell=()=>{const y=bag.filter(t=>t==='yellow').length,b=bag.filter(t=>t==='black').length;const earn=y*8+b*12;cash+=earn;bag=[];log(`Sold ${y} yellow, ${b} black = $${earn}`);upd()}
window.trespass=()=>{if(mp<5){log('Too tired to trespass');return}mp-=5;let nz;do{nz=Math.floor(Math.random()*6)}while(nz===cur);cur=nz;px=400;py=300;log('Trespassed to zone '+cur);spawn(cur);upd()}
window.buyGear=g=>{const costs={boots:{c:40,i:{cloth:2}},basket:{c:60,i:{bark:3}},waders:{c:80,i:{cloth:4}},swamp:{c:70,i:{bark:3,stone:2}}};const cost=costs[g];if(!cost||gear[g])return;if(cash<cost.c){log('Need $'+cost.c);return}for(const [k,v] of Object.entries(cost.i))if((inv[k]||0)<v){log('Need '+v+' '+k);return}cash-=cost.c;for(const [k,v] of Object.entries(cost.i))inv[k]-=v;gear[g]=true;if(g==='basket')maxBag=26;log('Crafted '+g+'!');upd()}
window.rest=()=>{if(cash<5){log('Need $5');return}cash-=5;mp=maxMp;log('Rested to full MP');upd()}
window.useHerb=()=>{if(inv.herb<1){log('No herbs');return}inv.herb--;mp=Math.min(maxMp,mp+20);log('+20 MP');upd()}
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);else if(e.key==='ArrowRight')mv(1,0);else if(e.key==='ArrowUp')mv(0,-1);else if(e.key==='ArrowDown')mv(0,1);else if(e.code==='Space'){e.preventDefault();poke()}});
spawn(0);upd();setInterval(()=>{if(mp<maxMp){mp=Math.min(maxMp,mp+(gear.boots?0.4:0.25));upd()}},1000);
function draw(){ctx.clearRect(0,0,800,600);ctx.drawImage(bgCan[cur],0,0);
 if(waterCan[cur]&&gear.waders){ctx.globalAlpha=0.35;ctx.drawImage(waterCan[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#6ecfff';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(swampCan[cur]&&gear.swamp){ctx.globalAlpha=0.35;ctx.drawImage(swampCan[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#7CFF7C';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 ctx.drawImage(bushCan[cur],0,0);
 morels[cur].forEach(m=>{if(!m.revealed){ctx.drawImage(m.type==='false'?grassTuftS:grassTuft,m.x-7,m.y-10)}else{ctx.drawImage(m.img,m.x-16,m.y-16,32,32)}});
 forage[cur].forEach(f=>{if(!f.taken)ctx.drawImage(grassTuft,f.x-7,f.y-10)});
 teleports.filter(t=>t.from===cur).forEach(t=>{ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(t.x,t.y,12,0,7);ctx.fill();ctx.strokeStyle='#fde047';ctx.lineWidth=2;ctx.beginPath();ctx.arc(t.x,t.y,16,0,7);ctx.stroke()});
 ctx.save();ctx.translate(px,py);ctx.scale(facing,1);
 if(lastDir==='up'){ctx.filter='brightness(0.7) contrast(1.1)';ctx.globalAlpha=0.92}
 else if(lastDir==='down'){ctx.filter='brightness(1.15) saturate(1.1)'}
 else {ctx.filter='brightness(1.0)'}
 ctx.drawImage(curSprite,-24,-24,48,48);ctx.filter='none';ctx.globalAlpha=1;ctx.restore();
 requestAnimationFrame(draw)}draw();log('v4.9 FULL GAME loaded - hunt!');
})();</script></body></html>
