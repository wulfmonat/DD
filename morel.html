<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Morel v4.8d</title><style>html,body{height:100%}body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px;margin:10px;background:#14141b;border:1px solid #23232e;border-radius:8px}#hud b{color:#fff}#game{width:1100px;height:825px;max-width:95vw;max-height:72vh;background:#000;border:1px solid #222;border-radius:8px;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:6px;flex-wrap:wrap}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:7px 10px;border-radius:7px;font:inherit;cursor:pointer}button:hover{background:#20202c}#log{width:1100px;max-width:95vw;height:95px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">0</b> Bag:<b id="bag">0/18</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Inv:<b id="inv">-</b></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button><button onclick="trespass()">TRESPASS</button></div>
<div id="controls"><button onclick="buyGear('boots')">Boots $40+2C</button><button onclick="buyGear('basket')">Basket $60+3B</button><button onclick="buyGear('waders')">Waders $80+4C</button><button onclick="buyGear('swamp')">Swamp $70+3B+2S</button><button onclick="rest()">Rest $5</button><button onclick="useHerb()">Herb +20</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18;
const bgCan=[],bushCan=[],waterCan=[],swampCan=[];
const morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={stick:0,bark:0,herb:0,stone:0,cloth:0};
const gear={boots:false,basket:false,waders:false,swamp:false};
let cleared=new Set();
const teleports=[{from:0,x:790,y:514,to:1,x2:39,y2:517},{from:1,x:10,y:514,to:0,x2:764,y2:524},{from:1,x:790,y:55,to:2,x2:45,y2:54},{from:2,x:10,y:55,to:1,x2:770,y2:53},{from:2,x:680,y:590,to:3,x2:685,y2:32},{from:3,x:680,y:10,to:2,x2:683,y2:572},{from:3,x:10,y:545,to:4,x2:765,y2:541},{from:4,x:790,y:545,to:3,x2:26,y2:545},{from:4,x:10,y:104,to:5,x2:769,y2:99},{from:5,x:790,y:102,to:4,x2:35,y2:104},{from:5,x:10,y:540,to:0,x2:32,y2:544}];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;const $=id=>document.getElementById(id);
const log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
async function loadImg(n){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.src=BASE+n;i.onload=()=>r(i);i.onerror=()=>r(null)})}
async function proc(s,z){const im=await loadImg(s);if(!im)return document.createElement('canvas');const c=document.createElement('canvas');c.width=im.width;c.height=im.height;c.getContext('2d').drawImage(im,0,0);return c}
for(let i=0;i<6;i++){
 const bg=await loadImg(`Map_${i+1}_BG.png`);const bs=await loadImg(`Map_${i+1}_Bushes.png`);
 const wa=await loadImg(`Water_Puddles_${i+1}.png`);const sw=await loadImg(`Swamp_Puddles_${i+1}.png`);
 const bc=document.createElement('canvas');bc.width=800;bc.height=600;bc.getContext('2d').drawImage(bg,0,0,800,600);bgCan[i]=bc;
 const sc=document.createElement('canvas');sc.width=800;sc.height=600;sc.getContext('2d').drawImage(bs,0,0,800,600);bushCan[i]=sc;
 waterCan[i]=wa?(()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(wa,0,0,800,600);return c})():null;
 swampCan[i]=sw?(()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(sw,0,0,800,600);return c})():null;
}
function getA(can,x,y){return can?can.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}
function upd(){$('zone').textContent=cur;$('bag').textContent=bag.length+'/'+maxBag;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('inv').textContent=`S${inv.stick} B${inv.bark} H${inv.herb} C${inv.cloth}`}
function spawn(z){if(morels[z].length)return;for(let i=0;i<16;i++){let t=0;while(t++<400){const x=20+Math.random()*760,y=20+Math.random()*560;if(getA(bushCan[z],x,y)){morels[z].push({x,y,type:Math.random()<.5?'yellow':Math.random()<.8?'black':'false',revealed:false});break}}}forage[z]=[];for(let i=0;i<35;i++){let t=0;while(t++<300){const x=30+Math.random()*740,y=30+Math.random()*540;const p=bgCan[z].getContext('2d').getImageData(x,y,1,1).data;if(p[0]>=180&&p[0]<=230){const loot=['stick','stick','bark','bark','herb','stone','cloth'];forage[z].push({x,y,item:loot[Math.floor(Math.random()*7)],taken:false});break}}}}
function checkTP(){for(const t of teleports){if(t.from!==cur)continue;if(Math.hypot(px-t.x,py-t.y)<18){cleared.add(cur);cur=t.to;px=t.x2;py=t.y2;if(cur===0&&cleared.size>=6){for(let z=0;z<6;z++){morels[z]=[];forage[z]=[]}cleared.clear();log('Loop complete')}spawn(cur);break}}}
window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*4)),ny=Math.max(0,Math.min(599,py+dy*4));const p=bgCan[cur].getContext('2d').getImageData(nx,ny,1,1).data;const tan=p[0]>=180&&p[0]<=230;const bush=getA(bushCan[cur],nx,ny);const water=getA(waterCan[cur],nx,ny);const swamp=getA(swampCan[cur],nx,ny);let ok=tan||bush;if(water&&gear.waders)ok=true;if(swamp&&gear.swamp)ok=true;if(ok){px=nx;py=ny;checkTP()}upd()}
window.poke=()=>{if(mp<1){log('Tired');return}mp-=1;let m=morels[cur].find(o=>!o.revealed&&Math.hypot(px-o.x,py-o.y)<20);if(m){m.revealed=true;log('Peek '+m.type);upd();return}let f=forage[cur].find(o=>!o.taken&&Math.hypot(px-o.x,py-o.y)<18);if(f){f.taken=true;inv[f.item]++;log('Got '+f.item);upd();return}mp-=0.5}
window.sell=()=>{const y=bag.filter(t=>t==='yellow').length,b=bag.filter(t=>t==='black').length;cash+=y*8+b*12;bag=[];log('Sold');upd()}
window.trespass=()=>{mp=Math.max(0,mp-5);cur=Math.floor(Math.random()*6);px=400;py=300;spawn(cur);upd()}
window.buyGear=g=>{const cost={boots:{c:40,i:{cloth:2}},basket:{c:60,i:{bark:3}},waders:{c:80,i:{cloth:4}},swamp:{c:70,i:{bark:3,stone:2}}}[g];if(gear[g]||cash<cost.c)return;for(const k in cost.i)if(inv[k]<cost.i[k])return;cash-=cost.c;for(const k in cost.i)inv[k]-=cost.i[k];gear[g]=true;if(g==='basket')maxBag=26;log('Crafted '+g);upd()}
window.rest=()=>{if(cash>=5){cash-=5;mp=maxMp;upd()}};window.useHerb=()=>{if(inv.herb>0){inv.herb--;mp=Math.min(maxMp,mp+20);upd()}};
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);else if(e.key==='ArrowRight')mv(1,0);else if(e.key==='ArrowUp')mv(0,-1);else if(e.key==='ArrowDown')mv(0,1);else if(e.code==='Space')poke()});
spawn(0);upd();setInterval(()=>{if(mp<maxMp)mp=Math.min(maxMp,mp+(gear.boots?0.4:0.25))},1000);
function draw(){ctx.clearRect(0,0,800,600);ctx.drawImage(bgCan[cur],0,0);if(waterCan[cur]&&gear.waders){ctx.globalAlpha=0.25;ctx.globalCompositeOperation='screen';ctx.drawImage(waterCan[cur],0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}if(swampCan[cur]&&gear.swamp){ctx.globalAlpha=0.22;ctx.globalCompositeOperation='screen';ctx.drawImage(swampCan[cur],0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}ctx.drawImage(bushCan[cur],0,0);morels[cur].forEach(m=>{ctx.fillStyle=m.revealed?(m.type==='yellow'?'#fd0':m.type==='black'?'#333':'#a44'):'#2a5';ctx.fillRect(m.x-3,m.y-3,6,6)});forage[cur].forEach(f=>{if(!f.taken){ctx.fillStyle='#3a3';ctx.fillRect(f.x-2,f.y-2,4,4)}});ctx.fillStyle='#fff';ctx.fillRect(px-3,py-3,6,6);requestAnimationFrame(draw)}draw();log('v4.8d ready');
})();</script></body></html>
