<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morel v4.8f</title><style>body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px;margin:10px;background:#14141b;border-radius:8px}#hud b{color:#fff}#game{width:1100px;height:825px;max-width:95vw;max-height:70vh;background:#000;border:1px solid #222}#controls{display:flex;gap:6px;margin:6px;flex-wrap:wrap}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:6px 9px;border-radius:6px;font:inherit}#log{width:1100px;max-width:95vw;height:90px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">0</b> Bag:<b id="bag">0/18</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Inv:<b id="inv">-</b></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button></div>
<div id="controls"><button onclick="buyGear('boots')">Boots</button><button onclick="buyGear('basket')">Basket</button><button onclick="buyGear('waders')">Waders</button><button onclick="buyGear('swamp')">Swamp</button><button onclick="rest()">Rest</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18;
const bgCan=[],bushCan=[],waterCan=[],swampCan=[],morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={stick:0,bark:0,herb:0,stone:0,cloth:0},gear={boots:false,basket:false,waders:false,swamp:false};
const $=id=>document.getElementById(id),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
const cv=$('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;

async function loadCan(name){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+name})}

log('Loading maps...');
for(let i=1;i<=6;i++){
 bgCan[i-1]=await loadCan(`Map_${i}_BG.png`);
 bushCan[i-1]=await loadCan(`Map_${i}_Bushes.png`);
 waterCan[i-1]=await loadCan(`Water_Puddles_${i}.png`); // will be null if missing
 swampCan[i-1]=await loadCan(`Swamp_Puddles_${i}.png`);
}
if(!bgCan[0]){log('ERROR: Base maps failed to load');return}

async function loadSprite(n){const im=await loadCan(n);const c=document.createElement('canvas');c.width=64;c.height=64;c.getContext('2d').drawImage(im,0,0,64,64);return c}
const [sprW1]=await Promise.all([loadSprite('foragespritewalk1.png')]);let curSprite=sprW1;

function upd(){$('zone').textContent=cur;$('bag').textContent=bag.length+'/'+maxBag;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('inv').textContent=`S${inv.stick} B${inv.bark} C${inv.cloth}`}
function spawn(z){if(morels[z].length)return;for(let i=0;i<15;i++)morels[z].push({x:100+Math.random()*600,y:100+Math.random()*400,type:'yellow',revealed:false});for(let i=0;i<30;i++)forage[z].push({x:50+Math.random()*700,y:50+Math.random()*500,item:['stick','bark','cloth'][Math.floor(Math.random()*3)],taken:false})}
function getA(can,x,y){return can&&x>=0&&y>=0&&x<800&&y<600?can.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}

window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*5)),ny=Math.max(0,Math.min(599,py+dy*5));const tan=true;const water=getA(waterCan[cur],nx,ny),swamp=getA(swampCan[cur],nx,ny);let ok=tan;if(water&&!gear.waders)ok=false;if(swamp&&!gear.swamp)ok=false;if(water&&gear.waders)ok=true;if(swamp&&gear.swamp)ok=true;if(ok){px=nx;py=ny}upd()}
window.poke=()=>{mp=Math.max(0,mp-1);let f=forage[cur].find(o=>!o.taken&&Math.hypot(px-o.x,py-o.y)<20);if(f){f.taken=true;inv[f.item]++;log('Got '+f.item)}upd()}
window.sell=()=>{cash+=10;bag=[];upd()}
window.buyGear=g=>{gear[g]=true;if(g==='basket')maxBag=26;if(g==='waders')log('Waders: water walkable');if(g==='swamp')log('Swamp boots: swamp walkable');upd()}
window.rest=()=>{mp=100;upd()}

spawn(0);upd();
function draw(){ctx.clearRect(0,0,800,600);if(bgCan[cur])ctx.drawImage(bgCan[cur],0,0);
 if(waterCan[cur]&&gear.waders){ctx.globalAlpha=0.3;ctx.globalCompositeOperation='screen';ctx.drawImage(waterCan[cur],0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}
 if(swampCan[cur]&&gear.swamp){ctx.globalAlpha=0.25;ctx.globalCompositeOperation='screen';ctx.drawImage(swampCan[cur],0,0);ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over'}
 if(bushCan[cur])ctx.drawImage(bushCan[cur],0,0);
 forage[cur].forEach(f=>{if(!f.taken){ctx.fillStyle='#3a3';ctx.fillRect(f.x-2,f.y-2,4,4)}});
 ctx.fillStyle='#fff';ctx.fillRect(px-3,py-3,6,6);requestAnimationFrame(draw)}
draw();log('v4.8f loaded - test movement');
})();</script></body></html>
