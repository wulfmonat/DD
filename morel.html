<!DOCTYPE html><html><head><meta charset="utf-8"><title>Morel v5.2</title><style>body{margin:0;background:#0b0b0e;color:#ddd;font:14px monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:10px;padding:7px;background:#14141b;border:1px solid #222;border-radius:7px;margin:6px;flex-wrap:wrap}#hud b{color:#fff}.pill{padding:2px 6px;border-radius:99px;font-size:11px;display:none}#hide{background:#1e2a1e;color:#9fe29f}#alert{background:#3a1e1e;color:#ff8080}#game{width:1100px;height:825px;max-width:96vw;max-height:68vh;background:#000;border:1px solid #222;image-rendering:pixelated}#controls{display:flex;gap:5px;margin:5px}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:6px 9px;border-radius:6px;cursor:pointer}#log{width:1100px;max-width:96vw;height:95px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:5px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">0</b> Day:<b id="day">1</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Bag:<b id="bag">0/18</b> Scent:<b id="scent">0</b> <span id="hide" class="pill">HIDING</span> <span id="alert" class="pill">SPOTTED</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button><button onclick="toggleTrespass()">TRESPASS</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18,facing=1,lastDir='down',pickAnim=0,day=1,minutes=480,trespass=false,scentTrail=[];
const bg=[],bush=[],water=[],swamp=[],morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={cloth:2,bark:3,herb:0,stone:0},gear={boots:false,basket:false,waders:true,swamp:true};
let guards=[],dogs=[];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=i=>document.getElementById(i),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
async function load(n){const i=new Image();i.crossOrigin='anonymous';return new Promise(r=>{i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.src=BASE+n})}
async function spr(n){const im=new Image();im.crossOrigin='anonymous';im.src=BASE+n;return new Promise(r=>{im.onload=()=>{const t=document.createElement('canvas');t.width=64;t.height=64;const g=t.getContext('2d');g.drawImage(im,0,0,im.width,im.height,0,0,64,64);r(t)};im.src=BASE+n})}
const [w1,w2,p1]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png'].map(spr));let curSpr=w1;
for(let i=0;i<6;i++){bg[i]=await load(`Map_${i+1}_BG.png`);bush[i]=await load(`Map_${i+1}_Bushes.png`);water[i]=await load(`Water_Puddles_${i+1}.png`);swamp[i]=await load(`Swamp_Puddles_${i+1}.png`)}
function a(c,x,y){return c?c.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}
function upd(){$('zone').textContent=cur;$('day').textContent=day;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('bag').textContent=bag.length+'/'+maxBag;$('scent').textContent=scentTrail.length;$('hide').style.display=(trespass&&a(bush[cur],px,py))?'inline-block':'none';$('alert').style.display=guards.some(g=>inCone(g))?'inline-block':'none'}
function spawn(z){if(morels[z].length)return;for(let i=0;i<16;i++){let t=0;while(t++<300){const x=30+Math.random()*740,y=30+Math.random()*540;if(a(bush[z],x,y)){morels[z].push({x,y,type:Math.random()<.7?'yellow':'black',revealed:false});break}}}}
function inCone(g){const dx=px-g.x,dy=py-g.y,d=Math.hypot(dx,dy);if(d>85)return false;if(a(bush[cur],px,py))return false;const ang=Math.atan2(dy,dx);let da=Math.abs(((ang-g.ang+Math.PI*3)%(2*Math.PI))-Math.PI);return da<1.05}
function guardStep(g){g.x+=g.vx;g.y+=g.vy;if(g.x<40||g.x>760)g.vx*=-1;if(g.y<40||g.y>560)g.vy*=-1;g.ang=Math.atan2(g.vy,g.vx)}
function dogStep(d){if(scentTrail.length===0)return;const t=scentTrail[0];const dx=t.x-d.x,dy=t.y-d.y,dist=Math.hypot(dx,dy);if(dist>2){d.x+=dx/dist*2.1;d.y+=dy/dist*2.1}}

window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*4)),ny=Math.max(0,Math.min(599,py+dy*4));const p=bg[cur].getContext('2d').getImageData(nx,ny,1,1).data;const ok=p[0]>=170||a(bush[cur],nx,ny)||(a(water[cur],nx,ny)&&gear.waders)||(a(swamp[cur],nx,ny)&&gear.swamp);if(!ok)return;px=nx;py=ny;if(dx<0)facing=-1;if(dx>0)facing=1;if(dy<0)lastDir='up';if(dy>0)lastDir='down';curSpr=curSpr===w1?w2:w1;if(trespass){mp-=gear.boots?0.04:0.08;scentTrail.push({x:px,y:py,t:Date.now()});if(scentTrail.length>300)scentTrail.shift();if(mp<=0)endTrespass('exhausted')}upd()}
window.poke=()=>{curSpr=p1;setTimeout(()=>curSpr=w1,150);let m=morels[cur].find(o=>Math.hypot(px-o.x,py-o.y)<20);if(m&&!m.revealed){m.revealed=true;log('Peek');}else if(m){morels[cur]=morels[cur].filter(x=>x!==m);if(bag.length<maxBag){bag.push(m.type);pickAnim=12;log('Picked'+(trespass?' *hot*':''))}}upd()}
window.sell=()=>{const v=bag.reduce((s,t)=>s+(t==='yellow'?8:12)*(trespass?2:1),0);cash+=v;bag=[];log('Sold $'+v);upd()}
window.toggleTrespass=()=>{if(trespass){endTrespass('left');return}if(cur===0){log('Woods is safe');return}trespass=true;mp=100;scentTrail=[];guards=[];dogs=[];const gc=cur===5?3:2;for(let i=0;i<gc;i++)guards.push({x:100+Math.random()*600,y:100+Math.random()*400,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,ang:0});for(let i=0;i<2;i++)dogs.push({x:400+Math.random()*100,y:300});log('TRESPASS ACTIVE');upd()}
function endTrespass(r){if(!trespass)return;trespass=false;if(r==='bust'){const fine=30+Math.floor(Math.random()*40);cash=Math.max(0,cash-fine);bag=[];log('BUSTED! -$'+fine)}else log('Left');day++;guards=[];dogs=[];scentTrail=[];cur=0;px=10;py=540;upd()}

spawn(0);upd();
function draw(){ctx.clearRect(0,0,800,600);ctx.drawImage(bg[cur],0,0);
 if(water[cur]&&gear.waders){ctx.globalAlpha=.3;ctx.drawImage(water[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#6ecfff';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(swamp[cur]&&gear.swamp){ctx.globalAlpha=.3;ctx.drawImage(swamp[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#7CFF7C';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 ctx.drawImage(bush[cur],0,0);
 morels[cur].forEach(m=>{if(!m.revealed){ctx.fillStyle='#223';ctx.fillRect(m.x-3,m.y-3,6,6)}else{ctx.fillStyle=m.type==='yellow'?'#ffd54f':'#8d6e63';ctx.beginPath();ctx.arc(m.x,m.y,6,0,7);ctx.fill()}});
 if(trespass){guards.forEach(g=>{guardStep(g);ctx.save();ctx.translate(g.x,g.y);ctx.rotate(g.ang);ctx.fillStyle='rgba(255,235,100,0.15)';ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,85,-1.05,1.05);ctx.fill();ctx.restore();ctx.fillStyle='#e53935';ctx.beginPath();ctx.arc(g.x,g.y,7,0,7);ctx.fill();if(inCone(g))endTrespass('bust')});dogs.forEach(d=>{dogStep(d);ctx.fillStyle='#5d4037';ctx.beginPath();ctx.arc(d.x,d.y,7,0,7);ctx.fill();if(Math.hypot(px-d.x,py-d.y)<14&&!a(bush[cur],px,py))endTrespass('bust')});scentTrail=scentTrail.filter(s=>Date.now()-s.t<(gear.boots?3000:5000));ctx.strokeStyle='rgba(200,160,100,0.2)';scentTrail.forEach(s=>{ctx.beginPath();ctx.arc(s.x,s.y,2,0,7);ctx.stroke()})}
 ctx.save();ctx.translate(px,py-pickAnim/4);ctx.scale(facing,1);if(lastDir==='up')ctx.filter='brightness(0.7)';else if(lastDir==='down')ctx.filter='brightness(1.15)';ctx.drawImage(curSpr,-24,-24,48,48);ctx.restore();if(pickAnim>0)pickAnim--;
 requestAnimationFrame(draw)}draw();log('v5.2 ready - trespass uses old AI, new graphics');
addEventListener('keydown',e=>{if(e.key==='ArrowLeft')mv(-1,0);if(e.key==='ArrowRight')mv(1,0);if(e.key==='ArrowUp')mv(0,-1);if(e.key==='ArrowDown')mv(0,1);if(e.code==='Space')poke()});
})();</script></body></html>
