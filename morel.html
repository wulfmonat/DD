<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morel v4.7</title><style>:root{color-scheme:dark} html,body{height:100%} body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px/1.25 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;gap:14px;align-items:center;padding:8px 12px;margin:12px 0 8px;background:#14141b;border:1px solid #23232e;border-radius:10px;box-shadow:0 2px 10px #0008}
#hud b{color:#fff;margin-left:4px}
.pill{display:none;padding:2px 8px;border-radius:999px;background:#1e2a1e;border:1px solid #2f4630;color:#9fe29f;font-size:11px;letter-spacing:.5px}
#game{width:1100px;height:825px;max-width:95vw;max-height:78vh;background:#000;border:1px solid #22242e;border-radius:8px;image-rendering:pixelated;image-rendering:crisp-edges}
#controls{display:flex;gap:6px;margin:10px 0;flex-wrap:wrap;justify-content:center}
button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:8px 12px;border-radius:8px;font:inherit;cursor:pointer;min-width:44px}
button:hover{background:#20202c}
button:active{transform:translateY(1px)}
#log{width:1100px;max-width:95vw;height:90px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;border-radius:8px;padding:6px 8px;font-size:12px;color:#a9a9b3;white-space:pre-line}
</style></head><body><div id="hud"><span>Zone:<b id="zone">0</b></span><span>Bag <b id="bag">0/18</b></span><span>$<b id="cash">75</b></span><span>MP <b id="mp">100</b></span><span id="hide" class="pill">HIDING</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button><button onclick="trespass()">TRESPASS</button></div><div id="log"></div><script>(async()=>{
<div id="controls" style="margin-top:4px">
 <button onclick="buyGear('boots')">Boots $40+2cloth</button>
 <button onclick="buyGear('basket')">Basket $60+3bark</button>
 <button onclick="buyGear('waders')">Waders $80+4cloth</button>
 <button onclick="buyGear('machete')">Machete $50+2stick+1stone</button>
 <button onclick="rest()">Rest -$5</button>
</div>
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
window.cur=0; window.px=10; window.py=540; window.bag=[]; window.cash=75; window.mp=100; window.maxMp=100;
window.bgs=[]; window.bush=[];
const bgCan=[], bushCan=[];
const morels=[[],[],[],[],[],[]];
const forage=[[],[],[],[],[],[]]; // new: sticks, bark, herbs, etc
const inventory={stick:0,bark:0,herb:0,stone:0,cloth:0};
 const gear={boots:false,basket:false,waders:false,machete:false,map:false};
window.buyGear=(g)=>{
 const cost={boots:{c:40,i:{cloth:2}}, basket:{c:60,i:{bark:3}}, waders:{c:80,i:{cloth:4}}, machete:{c:50,i:{stick:2,stone:1}}}[g];
 if(gear[g]){log('Already own');return}
 if(cash<cost.c){log('Need $'+cost.c);return}
 for(const [k,v] of Object.entries(cost.i||{})){ if((inventory[k]||0)<v){log('Need '+v+' '+k);return} }
 cash-=cost.c; for(const [k,v] of Object.entries(cost.i||{})) inventory[k]-=v; gear[g]=true;
 if(g==='basket') window.maxBag=26; // increase later
 log('Crafted '+g); upd();
};
window.rest=()=>{ if(cash<5){log('Need $5');return} cash-=5; mp=maxMp; log('Rested to full MP'); upd(); };
const teleports = [
{from:0,x:790,y:514,to:1,x2:39,y2:517}, {from:1,x:10,y:514,to:0,x2:764,y2:524}, {from:1,x:790,y:55,to:2,x2:45,y2:54}, {from:2,x:10,y:55,to:1,x2:770,y2:53},
{from:2,x:680,y:590,to:3,x2:685,y2:32}, {from:3,x:680,y:10,to:2,x2:683,y2:572}, {from:3,x:10,y:545,to:4,x2:765,y2:541},
{from:4,x:790,y:545,to:3,x2:26,y2:545}, {from:4,x:10,y:104,to:5,x2:769,y2:99}, {from:5,x:790,y:102,to:4,x2:35,y2:104}, {from:5,x:10,y:540,to:0,x2:32,y2:544},
]; let lastBrush=0, walk=false;
const cv=document.getElementById('game'), ctx=cv.getContext('2d'); ctx.imageSmoothingEnabled=false;
const $=id=>document.getElementById(id);
function log(t){$('log').textContent = t + '\n' + $('log').textContent}
async function proc(src,size){
 return new Promise(res=>{
  const im=new Image(); im.crossOrigin='anonymous'; im.src=BASE+src;
  im.onload=()=>{
   const c=document.createElement('canvas'); c.width=im.width; c.height=im.height;
   const g=c.getContext('2d'); g.drawImage(im,0,0);
   const d=g.getImageData(0,0,c.width,c.height), a=d.data;
   let minX=c.width, minY=c.height, maxX=0, maxY=0;
   for(let y=0;y<c.height;y++){for(let x=0;x<c.width;x++){
    const i=(y*c.width+x)*4, r=a[i],gc=a[i+1],b=a[i+2];
    if(r>240&&gc>240&&b>240){a[i+3]=0}else{minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y)} } } g.putImageData(d,0,0);
   if(maxX<minX){minX=0;minY=0;maxX=c.width-1;maxY=c.height-1} const w=maxX-minX+1,h=maxY-minY+1;
   const o=document.createElement('canvas'); o.width=size; o.height=size;
   const og=o.getContext('2d'); og.imageSmoothingEnabled=false; og.drawImage(c,minX,minY,w,h,0,0,size,size); res(o); };
  im.onerror=()=>res(document.createElement('canvas')); });
}
async function loadSprite(name){
 return new Promise(res=>{
  const im=new Image(); im.crossOrigin='anonymous'; im.src=BASE+name;
  im.onload=()=>{
   const tmp=document.createElement('canvas'); tmp.width=im.width; tmp.height=im.height;
   const tg=tmp.getContext('2d'); tg.drawImage(im,0,0);
   const d=tg.getImageData(0,0,tmp.width,tmp.height), a=d.data;
   let minX=tmp.width, minY=tmp.height, maxX=0, maxY=0;
   for(let y=0;y<tmp.height;y++){for(let x=0;x<tmp.width;x++){
    const i=(y*tmp.width+x)*4;
    if(a[i]>240 && a[i+1]>240 && a[i+2]>240) a[i+3]=0;
    if(a[i+3]>10){ minX=Math.min(minX,x); maxX=Math.max(maxX,x); minY=Math.min(minY,y); maxY=Math.max(maxY,y); }
   }}
   tg.putImageData(d,0,0);
   const w = maxX-minX+1, h = maxY-minY+1;
   const out=document.createElement('canvas'); out.width=64; out.height=64;
   const og=out.getContext('2d'); og.imageSmoothingEnabled=false;
   const scale = Math.min(45/w, 45/h);
   const dw = w*scale, dh = h*scale;
   og.drawImage(tmp, minX,minY,w,h, (64-dw)/2, (64-dh)/2, dw,dh);
   res(out); };
 });
}
const [sprW1,sprW2,sprP1,sprP2]=await Promise.all([loadSprite('foragespritewalk1.png'),loadSprite('foragespritewalk2.png'),loadSprite('foragespritepoke1.png'),loadSprite('foragespritepoke2.png')]); let curSprite=sprW1;
const [imgY,imgB,imgF]=await Promise.all([proc('yellowmorel.png',32),proc('blackmorel.png',32),proc('falsemorel.png',20)]);
// load real tufts
async function loadTuft(name,w,h){
 return new Promise(res=>{
  const im=new Image(); im.crossOrigin='anonymous'; im.src=BASE+name;
  im.onload=()=>{ const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(im,0,0,w,h); res(c); };
  im.onerror=()=>{ const c=document.createElement('canvas'); c.width=w; c.height=h; const g=c.getContext('2d'); g.fillStyle='#2d6b2d'; g.fillRect(0, h-6, w,6); for(let i=0;i<5;i++) g.fillRect(2+i*5,2,2,h-4); res(c); };
 });
}
const grassTuft = await loadTuft('grasstuft.png',30,21);
const grassTuftS = await loadTuft('grasstuft_small.png',22,15);

for(let i=0;i<6;i++){
 const bg=new Image(); bg.crossOrigin='anonymous'; bg.src=BASE+`Map_${i+1}_BG.png`;
 const bs=new Image(); bs.crossOrigin='anonymous'; bs.src=BASE+`Map_${i+1}_Bushes.png`;
 await Promise.all([new Promise(r=>bg.onload=r),new Promise(r=>bs.onload=r)]);
 bgs[i]=bg; bush[i]=bs;
 const bc=document.createElement('canvas'); bc.width=800; bc.height=600; bc.getContext('2d').drawImage(bg,0,0,800,600); bgCan[i]=bc;
 const sc=document.createElement('canvas'); sc.width=800; sc.height=600; sc.getContext('2d').drawImage(bs,0,0,800,600); bushCan[i]=sc;
}
function bgPx(x,y){return bgCan[cur].getContext('2d').getImageData(x|0,y|0,1,1).data}
function bsA(x,y){return bushCan[cur].getContext('2d').getImageData(x|0,y|0,1,1).data[3]}
function bsAz(z,x,y){return bushCan[z].getContext('2d').getImageData(x|0,y|0,1,1).data[3]}
function upd(){ $('zone').textContent=cur; $('bag').textContent=bag.length+'/18'; $('cash').textContent=cash; $('mp').textContent=Math.floor(mp); $('hide').style.display = bsA(px,py)>10? 'inline-block':'none'; }
function spawn(z){
 if(morels[z].length) return;
 // 1) morels in bushes (keep yours)
 const n=15+Math.floor(Math.random()*6);
 for(let i=0;i<n;i++){ let tries=0; while(tries++<400){ const x=20+Math.random()*760, y=20+Math.random()*560; if(bsAz(z,x,y)>50){ const r=Math.random(); let t='yellow',im=imgY; if(r>=0.5&&r<0.8){t='black';im=imgB}else if(r>=0.8){t='false';im=imgF} morels[z].push({x,y,type:t,img:im,revealed:false}); break; } } }
 // 2) forage tufts along paths
 forage[z]=[];
 for(let i=0;i<35;i++){ let tries=0; while(tries++<300){ const x=30+Math.random()*740, y=30+Math.random()*540; const p=bgCan[z].getContext('2d').getImageData(x,y,1,1).data; const tan=p[0]>=180&&p[0]<=230&&p[1]>=150&&p[1]<=210&&p[2]>=110&&p[2]<=170; if(tan && Math.random()<0.7){ const loot=['stick','bark','herb','stone']; const it=loot[Math.floor(Math.random()*loot.length)]; forage[z].push({x,y,item:it,taken:false}); break; } } }
}
function checkTP(){
 for(const t of teleports){
  if(t.from!==cur) continue;
  if(Math.hypot(px-t.x, py-t.y) < 18){
   cur=t.to; px=t.x2; py=t.y2; log('Zone '+cur); spawn(cur); break;
  }
 }
}
window.mv=(dx,dy)=>{
 const nx=Math.max(0,Math.min(799,px+dx*4));
 const ny=Math.max(0,Math.min(599,py+dy*4));
 const p=bgPx(nx,ny), r=p[0],g=p[1],b=p[2];
 const tan = r>=180&&r<=230 && g>=150&&g<=210 && b>=110&&b<=170;
 const p=bgPx(nx,ny), r=p[0],g=p[1],b=p[2];
const water = b>120 && r<80 && g<140;
const tan = r>=180&&r<=230 && g>=150&&g<=210 && b>=110&&b<=170;
const ba=bsA(nx,ny);
let ok = false;
if(tan) ok=true; else if(ba>10) ok=true; else if(water && gear.waders) ok=true;
 const ba=bsA(nx,ny);
 let ok = false;
 if(tan) ok = true; else if(ba>10) ok = true;
 if(ok){ px=nx; py=ny; walk=!walk; curSprite=walk?sprW1:sprW2; checkTP(); }else{ const now=Date.now(); if(now-lastBrush>1500){log('Thick brush - stay on path'); lastBrush=now;} }
 upd();
};
window.poke=()=>{
 if(mp<5){ log('Too tired to poke - rest or use item'); return; }
 mp-=5; curSprite=sprP1; setTimeout(()=>curSprite=sprP2,110); setTimeout(()=>curSprite=sprW1,220);
 let idx=-1, best=1e9; morels[cur].forEach((m,i)=>{const d=Math.hypot(px-m.x,py-m.y); if(d<20&&d<best){best=d;idx=i}});
 if(idx>=0){
  const m=morels[cur][idx];
  if(!m.revealed){ m.revealed=true; log('You brush the grass aside... it\'s a '+m.type+' morel!'); upd(); return; }
  if(bag.length<18){ morels[cur].splice(idx,1); bag.push(m.type); log('Picked '+m.type+' morel (-5 MP)'); }else log('Bag full');
  upd(); return;
 }
 const ba=bsA(px,py);
 if(ba>10 && Math.random()<0.06){
  if(bag.length<18){ const r=Math.random(); const t=r<0.5?'yellow':r<0.8?'black':'false'; bag.push(t); log('Found hidden '+t+' morel (-5 MP)'); }else log('Bag full');
  // check forage tufts
let fIdx=-1, fb=1e9; forage[cur].forEach((f,i)=>{const d=Math.hypot(px-f.x,py-f.y); if(!f.taken && d<18 && d<fb){fb=d;fIdx=i}});
if(fIdx>=0){
 forage[cur][fIdx].taken=true;
 const it=forage[cur][fIdx].item;
 inventory[it] = (inventory[it]||0)+1;
 log('Foraged '+it+' (+1)'); upd(); return;
}
 }else log('Nothing here (-5 MP)');
 upd();
};
window.sell=()=>{ const y=bag.filter(t=>t==='yellow').length; const b=bag.filter(t=>t==='black').length; const f=bag.filter(t=>t==='false').length; const earn=y*8 + b*12; cash+=earn; bag.length=0; log(`Sold ${y} yellow, ${b} black, ${f} false for $${earn}`); upd(); };
window.trespass=()=>{ if(mp<5){log('Too tired');return} mp-=5; let nz; do{nz=Math.floor(Math.random()*6)}while(nz===cur); cur=nz; px=400; py=300; log('Trespassed'); spawn(cur); upd(); };
addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'){e.preventDefault();mv(-1,0)} else if(e.key==='ArrowRight'){e.preventDefault();mv(1,0)} else if(e.key==='ArrowUp'){e.preventDefault();mv(0,-1)} else if(e.key==='ArrowDown'){e.preventDefault();mv(0,1)} else if(e.code==='Space'){e.preventDefault();poke()} });
spawn(0); upd();
setInterval(()=>{ if(mp<maxMp){ mp=Math.min(maxMp, mp+0.2); upd(); } }, 1000);
function draw(){
 ctx.clearRect(0,0,800,600);
 ctx.drawImage(bgCan[cur],0,0,800,600);
 ctx.drawImage(bushCan[cur],0,0,800,600);
 // morels as grass tufts until revealed
 morels[cur].forEach(m=>{
  if(!m.revealed){
   const tuft = m.type==='false'? grassTuftS : grassTuft;
   ctx.drawImage(tuft,(m.x-tuft.width/2)|0,(m.y-tuft.height/2)|0);
  }else{
   const sz=m.type==='false'?20:32;
   ctx.drawImage(m.img,(m.x-sz/2)|0,(m.y-sz/2)|0,sz,sz);
  }
 });
 // forage tufts on paths
forage[cur].forEach(f=>{
 if(!f.taken){
  ctx.drawImage(grassTuft,(f.x-grassTuft.width/2)|0,(f.y-grassTuft.height/2)|0);
 }
});
 // teleports always visible
 teleports.filter(t=>t.from===cur).forEach(t=>{
  ctx.globalAlpha=0.9; ctx.fillStyle='#4ade80'; ctx.beginPath(); ctx.arc(t.x,t.y,14,0,7); ctx.fill(); ctx.globalAlpha=1;
  ctx.strokeStyle='#fde047'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(t.x,t.y,18,0,7); ctx.stroke();
 });
 ctx.drawImage(curSprite, (px-24)|0, (py-24)|0, 48,48);
 requestAnimationFrame(draw);
}
draw();
log('Morel v4.7 restored - tufts, peek-poke, 6 maps');
})();</script></body></html>
