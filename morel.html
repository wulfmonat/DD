<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morel Hunter v5.0</title><style>body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px 12px;margin:8px;background:#14141b;border:1px solid #23232e;border-radius:8px;flex-wrap:wrap}#hud b{color:#fff;margin-left:3px}.pill{padding:2px 6px;background:#1e2a1e;border-radius:99px;color:#9fe29f;font-size:11px;display:none}#game{width:1100px;height:825px;max-width:96vw;max-height:68vh;background:#000;border:1px solid #222;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:5px;flex-wrap:wrap;justify-content:center}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:7px 10px;border-radius:7px;font:inherit;cursor:pointer}button:hover{background:#222235}#log{width:1100px;max-width:96vw;height:100px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud"><span>Zone:<b id="zone">0</b></span><span>Day:<b id="day">1</b></span><span>Time:<b id="time">08:00</b></span><span>Bag:<b id="bag">0/18</b></span><span>$<b id="cash">75</b></span><span>MP:<b id="mp">100</b></span><span>Inv:<b id="inv">-</b></span><span id="hide" class="pill">HIDING</span></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE [Space]</button><button onclick="sell()">SELL</button><button onclick="trespass()">TRESPASS</button></div>
<div id="controls"><button onclick="buyGear('boots')">Boots $40+2C</button><button onclick="buyGear('basket')">Basket $60+3B</button><button onclick="buyGear('waders')">Waders $80+4C</button><button onclick="buyGear('swamp')">Swamp $70+3B+2S</button><button onclick="rest()">Rest $5</button><button onclick="useHerb()">Herb+20</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18,facing=1,lastDir='down',pickAnim=0,day=1,minutes=480;
const bg=[],bush=[],water=[],swamp=[],morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={stick:0,bark:0,herb:0,stone:0,cloth:0},gear={boots:false,basket:false,waders:false,swamp:false};
let cleared=new Set();
const tps=[{f:0,x:790,y:514,t:1,x2:39,y2:517},{f:1,x:10,y:514,t:0,x2:764,y2:524},{f:1,x:790,y:55,t:2,x2:45,y2:54},{f:2,x:10,y:55,t:1,x2:770,y2:53},{f:2,x:680,y:590,t:3,x2:685,y2:32},{f:3,x:680,y:10,t:2,x2:683,y2:572},{f:3,x:10,y:545,t:4,x2:765,y2:541},{f:4,x:790,y:545,t:3,x2:26,y2:545},{f:4,x:10,y:104,t:5,x2:769,y2:99},{f:5,x:790,y:102,t:4,x2:35,y2:104},{f:5,x:10,y:540,t:0,x2:32,y2:544}];
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;
const $=i=>document.getElementById(i),log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
async function load(n){const i=new Image();i.crossOrigin='anonymous';return new Promise(r=>{i.onload=()=>{const c=document.createElement('canvas');c.width=800;c.height=600;c.getContext('2d').drawImage(i,0,0,800,600);r(c)};i.onerror=()=>r(null);i.src=BASE+n})}
async function spr(n){const im=new Image();im.crossOrigin='anonymous';im.src=BASE+n;return new Promise(r=>{im.onload=()=>{const t=document.createElement('canvas');t.width=im.width;t.height=im.height;const g=t.getContext('2d');g.drawImage(im,0,0);const d=g.getImageData(0,0,t.width,t.height),a=d.data;let x1=t.width,y1=t.height,x2=0,y2=0;for(let y=0;y<t.height;y++)for(let x=0;x<t.width;x++){const j=(y*t.width+x)*4;if(a[j]>240&&a[j+1]>240&&a[j+2]>240)a[j+3]=0;if(a[j+3]>10){x1=Math.min(x1,x);x2=Math.max(x2,x);y1=Math.min(y1,y);y2=Math.max(y2,y)}}const w=x2-x1+1,h=y2-y1+1;const o=document.createElement('canvas');o.width=64;o.height=64;const s=Math.min(45/w,45/h);o.getContext('2d').drawImage(t,x1,y1,w,h,(64-w*s)/2,(64-h*s)/2,w*s,h*s);r(o)};im.onerror=()=>r(document.createElement('canvas'))})}
const [w1,w2,p1,p2]=await Promise.all(['foragespritewalk1.png','foragespritewalk2.png','foragespritepoke1.png','foragespritepoke2.png'].map(spr));let curSpr=w1;
async function p(s,z){const c=await load(s);const o=document.createElement('canvas');o.width=z;o.height=z;if(c)o.getContext('2d').drawImage(c,0,0,800,600,0,0,z,z);return o}
const [yM,bM,fM]=await Promise.all([p('yellowmorel.png',32),p('blackmorel.png',32),p('falsemorel.png',20)]);
const tuft=await p('grasstuft.png',15),tuftS=await p('grasstuft_small.png',11);
for(let i=0;i<6;i++){bg[i]=await load(`Map_${i+1}_BG.png`);bush[i]=await load(`Map_${i+1}_Bushes.png`);water[i]=await load(`Water_Puddles_${i+1}.png`);swamp[i]=await load(`Swamp_Puddles_${i+1}.png`)}
function a(c,x,y){return c?c.getContext('2d').getImageData(x,y,1,1).data[3]>5:false}
function fmt(m){const h=Math.floor(m/60)%24,mi=m%60;return String(h).padStart(2,'0')+':'+String(mi).padStart(2,'0')}
function upd(){$('zone').textContent=cur;$('day').textContent=day;$('time').textContent=fmt(minutes);$('bag').textContent=bag.length+'/'+maxBag;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('hide').style.display=a(bush[cur],px,py)?'inline-block':'none';$('inv').textContent=`S${inv.stick} B${inv.bark} H${inv.herb} St${inv.stone} C${inv.cloth}`}
function spawn(z){if(morels[z].length)return;for(let i=0;i<18;i++){let t=0;while(t++<400){const x=30+Math.random()*740,y=30+Math.random()*540;if(a(bush[z],x,y)){const r=Math.random();morels[z].push({x,y,type:r<.5?'yellow':r<.8?'black':'false',img:r<.5?yM:r<.8?bM:fM,revealed:false});break}}}forage[z]=[];for(let i=0;i<35;i++){let t=0;while(t++<300){const x=40+Math.random()*720,y=40+Math.random()*520;const p=bg[z].getContext('2d').getImageData(x,y,1,1).data;if(p[0]>=180){forage[z].push({x,y,item:['stick','stick','bark','bark','herb','stone','cloth'][Math.floor(Math.random()*7)],taken:false});break}}}}
function checkTP(){for(const t of tps){if(t.f!==cur)continue;if(Math.hypot(px-t.x,py-t.y)<18){cleared.add(cur);cur=t.t;px=t.x2;py=t.y2;log('→ Zone '+cur);if(cur===0&&cleared.size>=6){for(let z=0;z<6;z++){morels[z]=[];forage[z]=[]}cleared.clear();day++;log('Loop complete — Day '+day);}spawn(cur);break}}}
window.mv=(dx,dy)=>{const nx=Math.max(0,Math.min(799,px+dx*4)),ny=Math.max(0,Math.min(599,py+dy*4));const p=bg[cur].getContext('2d').getImageData(nx,ny,1,1).data;const tan=p[0]>=180;const ok=(tan||a(bush[cur],nx,ny))&&(!a(water[cur],nx,ny)||gear.waders)&&(!a(swamp[cur],nx,ny)||gear.swamp);if(ok){px=nx;py=ny;minutes=(minutes+1)%1440;if(dx<0)facing=-1;if(dx>0)facing=1;if(dy<0)lastDir='up';if(dy>0)lastDir='down';curSpr=curSpr===w1?w2:w1;checkTP()}upd()}
window.poke=()=>{if(mp<1){log('Tired');return}curSpr=p1;setTimeout(()=>curSpr=p2,100);setTimeout(()=>curSpr=w1,200);let i=-1,b=99;morels[cur].forEach((m,k)=>{const d=Math.hypot(px-m.x,py-m.y);if(d<22&&d<b){b=d;i=k}});if(i>=0){const m=morels[cur][i];if(!m.revealed){mp-=1;m.revealed=true;log('Peek '+m.type);upd();return}else{if(bag.length>=maxBag){log('Bag full');return}mp-=gear.boots?0.5:1;morels[cur].splice(i,1);bag.push(m.type);pickAnim=14;log('Picked '+m.type);upd();return}}const f=forage[cur].find(o=>!o.taken&&Math.hypot(px-o.x,py-o.y)<18);if(f){mp-=1;f.taken=true;inv[f.item]++;log('Got '+f.item);upd();return}mp-=0.5;upd()}
window.sell=()=>{const y=bag.filter(t=>t==='yellow').length,b=bag.filter(t=>t==='black').length;cash+=y*8+b*12;bag=[];log(`Sold $${y*8+b*12}`);upd()}
window.trespass=()=>{if(mp<5){log('Need 5 MP');return}mp-=5;cur=Math.floor(Math.random()*6);px=400;py=300;spawn(cur);log('Trespassed');upd()}
window.buyGear=g=>{const C={boots:{c:40,i:{cloth:2}},basket:{c:60,i:{bark:3}},waders:{c:80,i:{cloth:4}},swamp:{c:70,i:{bark:3,stone:2}}}[g];if(gear[g]||cash<C.c)return;for(const k in C.i)if(inv[k]<C.i[k]){log('Need '+C.i[k]+' '+k);return}cash-=C.c;for(const k in C.i)inv[k]-=C.i[k];gear[g]=true;if(g==='basket')maxBag=26;log(g+' ready');upd()}
window.rest=()=>{if(cash<5)return;cash-=5;mp=maxMp;minutes=(minutes+120)%1440;log('Rested');upd()};window.useHerb=()=>{if(inv.herb>0){inv.herb--;mp=Math.min(maxMp,mp+20);log('+20 MP');upd()}}
addEventListener('keydown',e=>{if(e.key.startsWith('Arrow')){e.preventDefault();mv(e.key==='ArrowLeft'?-1:e.key==='ArrowRight'?1:0,e.key==='ArrowUp'?-1:e.key==='ArrowDown'?1:0)}if(e.code==='Space'){e.preventDefault();poke()}});
spawn(0);upd();setInterval(()=>{if(mp<maxMp){mp=Math.min(maxMp,mp+(gear.boots?0.4:0.25));upd()}},1000);
function draw(){ctx.clearRect(0,0,800,600);ctx.drawImage(bg[cur],0,0);
 // day/night tint
 const h=Math.floor(minutes/60);let tint='rgba(0,0,0,0)';if(h<6||h>=20)tint='rgba(0,0,30,0.35)';else if(h<8)tint='rgba(255,180,100,0.12)';else if(h>=18)tint='rgba(255,120,60,0.15)';
 if(water[cur]&&gear.waders){ctx.globalAlpha=.35;ctx.drawImage(water[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#6ecfff';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 if(swamp[cur]&&gear.swamp){ctx.globalAlpha=.35;ctx.drawImage(swamp[cur],0,0);ctx.globalCompositeOperation='source-atop';ctx.fillStyle='#7CFF7C';ctx.fillRect(0,0,800,600);ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1}
 ctx.drawImage(bush[cur],0,0);
 morels[cur].forEach(m=>ctx.drawImage(m.revealed?m.img:(m.type==='false'?tuftS:tuft),m.x-(m.revealed?16:7),m.y-(m.revealed?16:10),m.revealed?32:15,m.revealed?32:15));
 forage[cur].forEach(f=>{if(!f.taken)ctx.drawImage(tuft,f.x-7,f.y-10)});
 tps.filter(t=>t.f===cur).forEach(t=>{ctx.fillStyle='#4ade80';ctx.beginPath();ctx.arc(t.x,t.y,9,0,7);ctx.fill();ctx.strokeStyle='#fde047';ctx.lineWidth=2;ctx.beginPath();ctx.arc(t.x,t.y,14,0,7);ctx.stroke()});
 ctx.save();ctx.translate(px,py-pickAnim/3);ctx.scale(facing,1);if(lastDir==='up')ctx.filter='brightness(0.7)';else if(lastDir==='down')ctx.filter='brightness(1.15) saturate(1.05)';ctx.drawImage(curSpr,-24,-24,48,48);ctx.restore();
 if(pickAnim>0){pickAnim--;ctx.globalAlpha=pickAnim/14;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(px,py-28,2+pickAnim/3,0,7);ctx.fill();ctx.globalAlpha=1}
 if(tint!=='rgba(0,0,0,0)'){ctx.fillStyle=tint;ctx.fillRect(0,0,800,600)}
 requestAnimationFrame(draw)}draw();log('v5.0 FULL - all systems go');
})();</script></body></html>
