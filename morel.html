<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><title>Morel v4.8c</title><style>html,body{height:100%}body{margin:0;background:#0b0b0e;color:#d7d7db;font:14px ui-monospace,monospace;display:flex;flex-direction:column;align-items:center}#hud{display:flex;gap:12px;padding:8px;margin:12px 0;background:#14141b;border:1px solid #23232e;border-radius:10px}#hud b{color:#fff}#game{width:1100px;height:825px;max-width:95vw;max-height:70vh;background:#000;border:1px solid #222;border-radius:8px;image-rendering:pixelated}#controls{display:flex;gap:6px;margin:6px;flex-wrap:wrap}button{background:#181821;color:#ddd;border:1px solid #2a2a3a;padding:6px 9px;border-radius:7px;font:inherit;cursor:pointer}#log{width:1100px;max-width:95vw;height:90px;overflow:auto;background:#0f0f14;border:1px solid #1c1c24;padding:6px;font-size:12px;white-space:pre-line}</style></head><body>
<div id="hud">Zone:<b id="zone">0</b> Bag:<b id="bag">0/18</b> $<b id="cash">75</b> MP:<b id="mp">100</b> Inv:<b id="inv">-</b></div>
<canvas id="game" width="800" height="600"></canvas>
<div id="controls"><button onclick="mv(-1,0)">←</button><button onclick="mv(0,-1)">↑</button><button onclick="mv(0,1)">↓</button><button onclick="mv(1,0)">→</button><button onclick="poke()">POKE</button><button onclick="sell()">SELL</button></div>
<div id="controls"><button onclick="buyGear('boots')">Boots $40+2C</button><button onclick="buyGear('basket')">Basket $60+3B</button><button onclick="buyGear('waders')">Waders $80+4C</button><button onclick="buyGear('swamp')">Swamp $70+3B+2S</button><button onclick="rest()">Rest $5</button></div>
<div id="log"></div>
<script>(async()=>{
const BASE='https://raw.githubusercontent.com/wulfmonat/DD/main/';
let cur=0,px=10,py=540,bag=[],cash=75,mp=100,maxMp=100,maxBag=18;
const bgCan=[],bushCan=[],waterCan=[],swampCan=[]; const morels=[[],[],[],[],[],[]],forage=[[],[],[],[],[],[]];
const inv={stick:0,bark:0,herb:0,stone:0,cloth:0}; const gear={boots:false,basket:false,waders:false,swamp:false}; let cleared=new Set();
const cv=document.getElementById('game'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false; const $=id=>document.getElementById(id);
const log=t=>{$('log').textContent=t+'\n'+$('log').textContent};
async function loadImg(n){return new Promise(r=>{const i=new Image();i.crossOrigin='anonymous';i.src=BASE+n;i.onload=()=>r(i);i.onerror=()=>r(null)})}
for(let i=0;i<6;i++){
 const bg=await loadImg(`Map_${i+1}_BG.png`); const bs=await loadImg(`Map_${i+1}_Bushes.png`);
 const wa=await loadImg(`Water_Puddles_${i+1}.png`); const sw=await loadImg(`Swamp_Puddles_${i+1}.png`);
 const bc=document.createElement('canvas');bc.width=800;bc.height=600;bc.getContext('2d').drawImage(bg,0,0,800,600);bgCan[i]=bc;
 const sc=document.createElement('canvas');sc.width=800;sc.height=600;sc.getContext('2d').drawImage(bs,0,0,800,600);bushCan[i]=sc;
 if(wa){const wc=document.createElement('canvas');wc.width=800;wc.height=600;wc.getContext('2d').drawImage(wa,0,0,800,600);waterCan[i]=wc} else waterCan[i]=null;
 if(sw){const mc=document.createElement('canvas');mc.width=800;mc.height=600;mc.getContext('2d').drawImage(sw,0,0,800,600);swampCan[i]=mc} else swampCan[i]=null;
}
function pxAt(can,x,y){return can?can.getContext('2d').getImageData(x,y,1,1).data[3]>10:false}
function upd(){$('zone').textContent=cur;$('bag').textContent=bag.length+'/'+maxBag;$('cash').textContent=cash;$('mp').textContent=Math.floor(mp);$('inv').textContent=`S${inv.stick} B${inv.bark} C${inv.cloth}`}
function spawn(z){if(morels[z].length)return;for(let i=0;i<18;i++){let t=0;while(t++<300){const x=30+Math.random()*740,y=30+Math.random()*540;if(pxAt(bushCan[z],x,y)){morels[z].push({x,y,type:Math.random()<.5?'yellow':Math.random()<.8?'black':'false',revealed:false});break}}}forage[z]=[];for(let i=0;i<35;i++){let t=0;while(t++<200){const x=40+Math.random()*720,y=40+Math.random()*520;const p=bgCan[z].getContext('2d').getImageData(x,y,1,1).data;if(p[0]>=180&&p[0]<=230){const loot=['stick','stick','bark','bark','herb','stone','cloth'];forage[z].push({x,y,item:loot[Math.floor(Math.random()*7)],taken:false});break}}}}
window.mv=(dx,dy)=>{
 const nx=Math.max(0,Math.min(799,px+dx*4)), ny=Math.max(0,Math.min(599,py+dy*4));
 const p=bgCan[cur].getContext('2d').getImageData(nx,ny,1,1).data;
 const tan=p[0]>=180, bush=pxAt(bushCan[cur],nx,ny);
 const water=pxAt(waterCan[cur],nx,ny), swamp=pxAt(swampCan[cur],nx,ny);
 let ok = tan || bush;
 if(water && gear.waders) ok=true;
 if(swamp && gear.swamp) ok=true;
 if(ok){ px=nx; py=ny; /* teleport logic here */ }
 upd()
}
window.poke=()=>{if(mp<1)return;mp-=1;let m=morels[cur].find(o=>!o.revealed&&Math.hypot(px-o.x,py-o.y)<20);if(m){m.revealed=true;log('Peek '+m.type);upd();return}let f=forage[cur].find(o=>!o.taken&&Math.hypot(px-o.x,py-o.y)<18);if(f){f.taken=true;inv[f.item]++;log('Foraged '+f.item);upd();return}mp-=0.5}
window.sell=()=>{const y=bag.filter(t=>t==='yellow').length;cash+=y*8;bag=[];log('Sold');upd()}
window.buyGear=g=>{const c={boots:{c:40,i:{cloth:2}},basket:{c:60,i:{bark:3}},waders:{c:80,i:{cloth:4}},swamp:{c:70,i:{bark:3,stone:2}}}[g];if(gear[g])return;if(cash<c.c)return;for(const k in c.i)if(inv[k]<c.i[k])return;cash-=c.c;for(const k in c.i)inv[k]-=c.i[k];gear[g]=true;if(g==='basket')maxBag=26;log('Crafted '+g);upd()}
window.rest=()=>{if(cash>=5){cash-=5;mp=maxMp;upd()}}
spawn(0);upd();setInterval(()=>{if(mp<maxMp)mp=Math.min(maxMp,mp+0.3)},1000);
function draw(){
 ctx.clearRect(0,0,800,600);
 ctx.drawImage(bgCan[cur],0,0);

 // WATER — only show when you HAVE waders (as a brighter path)
 if(waterCan[cur] && gear.waders){
  ctx.globalAlpha=0.25;
  ctx.globalCompositeOperation='screen'; // makes water pixels brighter
  ctx.drawImage(waterCan[cur],0,0);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
 }

 // SWAMP — only show when you HAVE swamp boots
 if(swampCan[cur] && gear.swamp){
  ctx.globalAlpha=0.22;
  ctx.globalCompositeOperation='screen';
  ctx.fillStyle='#b38bff'; // faint purple glow
  ctx.drawImage(swampCan[cur],0,0);
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=1;
 }

 ctx.drawImage(bushCan[cur],0,0);

 // morels and forage (simplified dots for test)
 morels[cur].forEach(m=>{
  if(!m.revealed){ctx.fillStyle='#2a5';ctx.fillRect(m.x-2,m.y-6,4,8)}
  else {ctx.fillStyle=m.type==='yellow'?'#fd0':m.type==='black'?'#333':'#a44';ctx.fillRect(m.x-4,m.y-4,8,8)}
 });
 forage[cur].forEach(f=>{if(!f.taken){ctx.fillStyle='#3a3';ctx.fillRect(f.x-2,f.y-2,4,4)}});

 // player
 ctx.fillStyle='#fff'; ctx.fillRect(px-3,py-3,6,6);
 requestAnimationFrame(draw)
})();</script></body></html>
